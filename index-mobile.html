const MS_CRIT=[
  ["custo",     "Custo de entrada",  "taxa da avaliação de 100 mil e se ela volta"],
  ["regras",    "Regras de risco",   "tipo de drawdown, teto total e limite diário"],
  ["meta",      "Meta de lucro",     "quanto é preciso ganhar para passar"],
  ["liberdade", "Liberdade",         "notícias, overnight, prazo e regra de consistência"],
  ["saque",     "Saque",             "divisão de lucro e prazo do primeiro pagamento"],
  ["confianca", "Confiança",         "tempo de casa, bandeiras e qualidade do dado"]
];

const MS_W={custo:15,regras:25,meta:15,liberdade:15,saque:15,confianca:15};

function msNotas(m){
  const n={}, por={};

  /* custo: 300 USD ≈ 90, 700 ≈ 45, 1200 ≈ 10; reembolso vale 12 */
  if(m.taxa100k==null){ n.custo=50; por.custo="taxa não publicada — tratada como mediana"; }
  else{
    let v=clamp(112-m.taxa100k/11,5,95);
    const b=m.reembolsavel===true?12:m.reembolsavel==="parcial"?6:0;
    n.custo=clamp(v+b,0,100);
    por.custo=`${money(m.taxa100k,0)} na conta de 100 mil`+
      (m.reembolsavel===true?", reembolsável":m.reembolsavel==="parcial"?", reembolso parcial":", não reembolsável");
  }

  /* regras: o tipo de drawdown é o que mais decide a vida do trader.
     tipoDD nulo = a própria mesa não publica a metodologia; isso é
     um demérito, não um dado neutro. */
  const base=m.tipoDD==="estatico"?85:m.tipoDD==="misto"?60:m.tipoDD==="trailing"?32:45;
  const folga=m.ddTotal==null?0:clamp((m.ddTotal-4)*5,0,15);
  const diario=m.ddDiario==null?8:clamp((m.ddDiario-2)*3,0,8);
  n.regras=clamp(base+folga+diario,0,100);
  por.regras=(m.tipoDD==null?"metodologia de drawdown não publicada":
              m.tipoDD==="estatico"?"drawdown estático":
              m.tipoDD==="misto"?"trailing que trava":"trailing sobre o pico")+
    (m.ddTotal!=null?`, teto ${m.ddTotal}%`:"")+
    (m.ddDiario==null?", sem limite diário":`, diário ${m.ddDiario}%`);

  /* meta: soma das fases; 0% (conta imediata) é o teto */
  n.meta=m.metaTotal==null?50:clamp(100-m.metaTotal*5.5,10,100);
  por.meta=m.metaTotal==null?"meta não publicada de forma comparável — tratada como mediana"
          :m.metaTotal===0?"conta imediata, sem meta"
          :`${m.metaTotal}% somando as fases`;

  /* liberdade: cinco travas independentes */
  let L=100; const trava=[];
  if(m.noticias==="nao"){L-=26;trava.push("notícias proibidas");}
  else if(m.noticias==="restrito"){L-=13;trava.push("janela restrita em notícias");}
  if(m.overnight===false){L-=18;trava.push("sem overnight");}
  if(m.fimDeSemana===false){L-=10;trava.push("sem fim de semana");}
  if(m.consistencia){L-=16;trava.push("regra de consistência");}
  if(m.prazoMax!=null){L-=12;trava.push(`prazo de ${m.prazoMax} dias`);}
  n.liberdade=clamp(L,0,100);
  por.liberdade=trava.length?trava.join(" · "):"sem travas relevantes";

  /* saque: divisão pesa mais que velocidade, mas velocidade conta */
  const div=m.divisao==null?45:clamp((m.divisao-60)*2.2,0,80);
  const vel=m.saqueDias==null?10:clamp(22-m.saqueDias*0.9,0,20);
  n.saque=clamp(div+vel,0,100);
  por.saque=(m.divisao==null?"divisão não publicada":`${m.divisao}% para o trader`)+
    (m.saqueDias!=null?`, primeiro saque em ${m.saqueDias} dias`:", prazo de saque não publicado");

  /* confiança: idade, bandeira e o quanto o próprio dado é firme */
  const anos=m.fundacao?2026-m.fundacao:2;
  let C=38+clamp(anos*9,0,34);
  if(m.bandeira==="grave")C-=45; else if(m.bandeira==="atencao")C-=22;
  if(m.confiancaDado==="baixa")C-=12; else if(m.confiancaDado==="media")C-=5;
  else C+=8;
  n.confianca=clamp(C,0,100);
  por.confianca=`${anos} ano(s) de operação`+
    (m.bandeira==="grave"?" · bandeira vermelha":m.bandeira==="atencao"?" · sinal de atenção":"")+
    ` · dado de confiança ${m.confiancaDado}`;

  return{n,por};
}

function msScore(m){
  const {n,por}=msNotas(m);
  const tot=Object.values(msW).reduce((a,b)=>a+b,0)||1;
  const s=MS_CRIT.reduce((a,[k])=>a+n[k]*msW[k],0)/tot;
  return{score:s,n,por};
}

a oficial diz 'All sales are final and no refund will be issued', ao contrário do que afirmam vários comparadores.","reembolsavel":false,"prazoMax":null,"consistencia":true,"consistenciaTxt":"40% Best Day Rule - nenhum dia pode representar mais de 40% do lucro acumulado. Aplica-se APENAS a saques sob demanda, nao ao quinzenal. Regra anti-HFT: duracao media das operacoes acima de 2 minutos || Regra de 40% Best Day aplicável apenas a saques sob demanda, não ao quinzenal.","noticias":"sim","noticiasTxt":"Sim, sem restrição declarada.","overnight":true,"fimDeSemana":false,"aceitaBrasil":true,"aceitaEUA":true,"bandeira":"atencao","bandeiraTxt":"Atrasos de saque e aplicação retroativa de regras, somados ao risco de grupo: a marca-irmã Alpha Futures, do mesmo dono, converteu payouts já aprovados em reembolso de taxa em julho de 2026.","confiancaDado":"alta","fonte":"https://help.alphacapitalgroup.uk/en/articles/6934220-what-is-the-maximum-total-loss","visto":"2026-07-19","observacoes":"CORRECAO IMPORTANTE CONTRA COMPARADORES: a taxa NAO e reembolsavel - politica oficial diz 'All sales are final and no refund will be issued', apesar de varios sites afirmarem o contrario. RISCO DE GRUPO (marca-irma, NAO a mesma entidade): a Alpha Futures Limited - futures-only sob o mesmo 'Alpha Group', mesmo dono - sofreu crise em 12/07/2026 com rescisao do contrato pela NinjaTrader, encerramento do Premium Plan e PAYOUTS PENDENTES CONVERTIDOS EM REEMBOLSO. Regras e contas sao entidades separadas, mas indica risco reputacional e de contraparte no grupo. RECLAMACOES: atrasos de payout (7-9% das avaliacoes negativas), demoras de KYC e 'risk interviews' que travam saques, e aplicacao retroativa de regras (caso de conta fechada em maio/2026 por supostas violacoes de outubro/2025). Trustpilot 4.7 com 16.000+ avaliacoes, majoritariamente positivo. || SEDE (registro societário conforme fonte original): Reino Unido (Alpha Capital Group Limited, company no. 13719951); execucao via ACG Markets, licen  apesar do nome da firma sugerir o contrário. O 'Smart Drawdown' do carro-chefe é um degrau único (de -10% para -5% do saldo inicial) e depois fixo, não um trailing.","divisao":80,"divisaoTxt":"80% base; ate 90% com add-on. IF1 = 90%. One-Phase/Two-Phase escalam para 90% apos 10% de ganho e 90 dias","saqueDias":0,"saqueTxt":"Instant: primeiro saque 14 dias apos o primeiro trade, depois a cada 7 dias. Challenges e Micro: sob demanda. Minimo USD 25, processado em ate 48h uteis || saqueDias = 0 porque nos challenges (Two-Phase de referência) o saque é sob demanda; o prazo de 14 dias vale para o produto Instant.","taxa100k":539,"taxaTxt":"539 USD (One-Phase e Two-Phase) / 4.599 USD (Instant Funding) - valores de comparador, NAO confirmados no site oficial | Reembolsável: Não || Preço do Two-Phase segundo comparador, NÃO confirmado no site oficial.","reembolsavel":false,"prazoMax":null,"consistencia":null,"consistenciaTxt":"Sem regra no Instant Funding ('No consistency rules' e destaque de marketing). No One-Phase ha condicao de saque: melhor dia nao pode exceder 40% do lucro total. Regra de risco de 1% por trade aplicada de forma agressiva (medida entrada->stop, nao perda realizada) || Campo em null: o texto oficial descreve a regra do Instant Funding (nenhuma) e do One-Phase (40%), mas não menciona o Two-Phase, que é o programa de referência.","noticias":"restrito","noticiasTxt":"Restrito: 'Trades executed within 4 minutes before or after a major news event are restricted.' Excecoes permitidas: IF Micro, IF1, One-Phase Micro, Two-Phase Micro, variantes Crypto e contas com add-on de noticias","overnight":true,"fimDeSemana":true,"aceitaBrasil":null,"aceitaEUA":true,"bandeira":"grave","bandeiraTxt":"Pior nota da lista no Trustpilot (3,1 com 31% de uma estrela) e padrão recorrente de negativa de saque por 'violação de compliance' descoberta apenas depois do pedido de pagamento.","confiancaDado":"alta","fonte":"https://instantfunding.com/trading-rules","visto":"2026-07-19","observacoes":"MUDANCA DE DOMINIO: instantfunding.io faz redirect 301 permanente para instantfunding.com - migracao, NAO encerramento. SINAL DE ALERTA PRINCIPAL: Trustpilot 3,1/5 com 31% de avaliacoes 1 estrela (~4.600 reviews) - a pior nota da lista. Padrao recorrente: trader lucra, solicita saque, e so entao recebe negativa por 'violacao de compliance' descoberta na revisao. Casos citados: negativa por uso de VPS invocando 'Clause 7.1.13' que, segundo o trader, nao menciona VPS/VPN no contrato; negativas por 'mesmo IP usado por multiplos usuarios' atribuidas a IP dinamico; caso de junho/2026 com saque de USD 254 negado apesar de prova de estar dentro do limite de 1% por USD 0,56. Reclamacao formal no Forex Peace Army sobre saque de USD 909 recusado. VPS/VPN proibidos, limitando traders de EA. PAGAMENTOS DECLARADOS (verificaveis on-chain): USD 3.047.806 em 2026 ate junho, USD 8.494.122 em 2025, USD 6.031.799 em 2024; USD 18,7M+ desde 2023. aceitaBrasil deixado null: a lista de jurisdicoes restritas nao e publica. || SEDE (registro societário conforme fonte original): Reino Unido (Londres) - nome comercial de IF Pro Ltd, com Acello Ltd como agente de pagamento. || NOTA DE NORMALIZAÇÃO: aceitaBrasil em null: a firma não publica a lista de jurisdições restritas."},{"nome":"FundingTraders","sede":"Estados Unidos","fundacao":2023,"mercados":["forex","indices","metais","energia","cripto"],"mercadosTxt":"forex, indices, metais, commodities/energia, crypto","plataformas":["MT5","TradeLocker"],"programaRef":"2-Step 100k (Pro10)","fases":2,"fasesTxt":"Instant Funded (sem challenge), 1-Step PRO, 2-Step Pro6, 2-Step Pro10","metaTotal":15,"metaTxt":"Sem meta (Instant) / 10% (1-Step) / 6% (Pro6) / 10% (Pro10) | Fase 2: 6% (Pro6) / 5% (Pro10) / null || Adotado o 2-Step Pro10 (10% + 5% = 15%) por ser o de parâmetros comparáveis ao padrão do setor; a firma também vende o 2-Step Pro6 (6% + 6% = 12%, com 6% de DD total e 3% diário, por USD 419).","ddTotal":10,"ddDiario":5,"ddTxt":"Tipo: TRAILING SOBRE O PICO no Instant Funded, COM TRAVA. Texto exato do help center oficial: '6% | This is trailing until 3% profit is made. Once 3% profit is made, maximum drawdown locks to initial account size.' Base: SALDO (high-water mark), nao equity flutuante. LACUNA: o tipo de DD dos programas 1-Step e 2-Step NAO foi confirmado em fonte oficial - as paginas listam apenas os percentuais sem esclarecer a metodologia. | DD total: 6% (Instant e Pro6) / 10% (1-Step e Pro10) | DD diário: 3% (Instant, 1-Step e Pro6) / 5% (Pro10)","tipoDD":null,"tipoDDTxt":"Campo em null: a fonte oficial NÃO declara a metodologia de drawdown dos programas 1-Step e 2-Step, apenas os percentuais. O único tipo confirmado é o do Instant Funded (trailing sobre o pico de saldo que trava aos 3% de lucro), que não é o programa de referência.","divisao":80,"divisaoTxt":"Instant Funded: 90% padrao (90-100%), add-on de 100%. 1-Step: 90-100%. 2-Step: 80-100%. Escala ate USD 2M","saqueDias":21,"saqueTxt":"Instant Funded: a cada 14 dias (fonte oficial alternativa cita 7 dias - inconsistencia interna). Avaliacao: a cada 21 dias, com opcao de 14 via add-on. Garantia de marketing: '2 business days. Every time' ou o trader recebe USD 1.000 || A cada 21 dias na avaliação, com opção de 14 dias via add-on pago.","taxa100k":999,"taxaTxt":"679 USD (Instant Funded) / 539 USD (1-Step) / 419 USD (Pro6) / 999 USD (Pro10). Promocoes recorrentes de 50% | Reembolsável: PARCIAL - true para 1-Step, Pro6 e Pro10 ('One-time Refundable Fee'). false para Instant Funded || Preço do Pro10, o 2-Step de parâmetros padrão. O Pro6 custa USD 419 e o 1-Step, USD 539. Promoções recorrentes de 50%. Reembolsável nos programas de avaliação, mas não no Instant Funded.","reembolsavel":true,"prazoMax":null,"consistencia":false,"consistenciaTxt":"Sim, 'Consistency Score'. Texto oficial: 'Your highest single-day profit cannot exceed a set percentage of your total profits - 15% on Instant Funded accounts and 50% on 1-Step PRO funded accounts.' NAO se aplica as contas 2-Step || O Consistency Score NÃO se aplica às contas 2-Step, que são o programa de referência.","noticias":"restrito","noticiasTxt":"Nao no Instant Funded: 'news trading is not allowed - opening, closing, or holding positions within the restricted window around high-impact news events is a Hard Breach.' Restrito nas demais: proibido abrir/fechar em 2 min de eventos de alto impacto, com no maximo 30% do lucro total vindo de trades influenciados por noticias","overnight":null,"fimDeSemana":null,"aceitaBrasil":true,"aceitaEUA":true,"bandeira":"grave","bandeiraTxt":"Atrasos de pagamento de semanas a meses, contradizendo frontalmente a garantia de marketing de dois dias úteis, e pedido de dissolução voluntária da entidade relacionada Funding Futures Group Inc. em maio de 2026.","confiancaDado":"alta","fonte":"https://fundingtraders.com/help/en/articles/12130924-instant-funding","visto":"2026-07-19","observacoes":"SINAIS DE ALERTA GRAVES. (1) ATRASOS DE PAGAMENTO: trader com saque solicitado em 26/01/2026 sem retorno do suporte; outro com saque aprovado ha mais de 5 semanas ainda nao pago em 01/05/2026; outro relatando 6 meses de espera desde outubro. Contradiz frontalmente a garantia de marketing de '2 dias uteis ou USD 1.000'. (2) DISSOLUCAO SOCIETARIA: registro no Florida Sunbiz mostra a entidade relacionada Funding Futures Group Inc. com pedido de dissolucao voluntaria em 20/05/2026, com o CEO declarando nao haver dividas enquanto traders permaneciam sem receber - verificar antes de aportar. (3) MUDANCA DE REGRA (05/2026): contas compradas antes de 08/05/2026 tem a taxa reembolsada no PRIMEIRO saque; contas a partir de 08/05/2026 so no SEGUNDO - piora material. (4) Negativas de pagamento por violacao da regra de noticias detectadas em revisao de risco. (5) Modelo de corretora propria levanta questoes de transparencia. Trustpilot 4,5 com ~2.560 avaliacoes; declara 53.000+ contas financiadas. NAO CONFUNDIR com FundingTicks (encerrada em 18/01/2026) nem com a tagline 'Funding Traders' do site da City Traders Imperium. || SEDE (registro societário conforme fonte original): Estados Unidos (Miami Beach, Florida) - FT US Inc. Fontes terceiras divergem citando Nova York, Dubai e Hong Kong."}];
const ALERTAS=[{"tipo":"ENCERRAMENTO","firma":"MyFundedFX / SeacrestFunded","data":"2026-02-06","gravidade":"ALTA","descricao":"MyFundedFX foi rebrandeada como SeacrestFunded sob a Seacrest Markets. Em 04/02/2026 a Seacrest anunciou o encerramento total da divisao prop; todas as contas e posicoes abertas foram fechadas em 06/02/2026, com apenas dois dias de aviso, deixando milhares de traders financiados sem conta. Janela de reembolso/pagamento final ate 28/02/2026, processada em ate 30 dias por ordem de chegada. Contas giveaway, breachadas e inativas ficaram inelegiveis. Experiencia dos traders foi desigual: alguns receberam reembolso em 1-4 dias, outros relataram redirecionamento entre departamentos, reembolso so em cripto quando o pagamento original foi em cartao, e rejeicao de payout alegando violacao de regra apos multiplos saques anteriores bem-sucedidos.","agravante":"myfundedfx.com hoje redireciona para seacrestmarkets.io, que exibe o aviso 'Seacrest Markets is no longer operating' - ou seja, a propria corretora CFD para a qual a firma pivotou tambem encerrou. Duplo encerramento.","fonte":"https://www.financemagnates.com/forex/seacrest-ends-prop-trading-after-integrating-myfundedfx-shifts-focus-to-cfds/","visto":"2026-07-19"},{"tipo":"ENCERRAMENTO","firma":"FundingTicks","data":"2026-01-18","gravidade":"ALTA","descricao":"Em dezembro/2025 introduziu mudancas de regra retroativas: exigencia de retencao minima de um minuto para scalpers, metas de lucro mais altas e reducao do split. Trades e lucros previamente validos foram retroativamente reduzidos ou invalidados. A nota no Trustpilot caiu de 4,1 (out/2025) para 3,2. Em 18/01/2026 anunciou o wind-down no Twitter, com suporte disponivel ate 31/01/2026. Um caso documentado: trader viu um saldo de conta financiada de USD 51.700 ser reduzido a um 'reembolso' de USD 59 por meio de uma cadeia de reinterpretacoes de clausulas que a firma nao havia aplicado nos seis meses anteriores.","distribuicao":"Contas de avaliacao e Master: reembolso integral independentemente de performance. Master que atingiram metas: split de 80%. Master que nao atingiram: 20%. Contas live lucrativas: reembolso + 90% dos lucros realizados + 20% do saldo inicial.","fonte":"https://www.financemagnates.com/forex/following-profit-cuts-and-trading-limits-prop-firm-fundingticks-begins-winding-down/","visto":"2026-07-19"},{"tipo":"CRISE_DE_PAGAMENTO","firma":"Alpha Futures (marca-irma da Alpha Capital Group)","data":"2026-07-12","gravidade":"CRITICA","descricao":"O evento mais recente e mais grave do setor. Em 12/07/2026 a NinjaTrader rescindiu o contrato com a Alpha Futures, que perdeu tambem o acesso ao Tradovate. A Alpha encerrou o Premium Plan e - ponto central - CONVERTEU PAYOUTS PENDENTES E JA APROVADOS EM REEMBOLSO DA TAXA DA CONTA, em vez de pagar os lucros devidos, inclusive para traders que eram elegiveis. A Alpha afirma ter pago mais de USD 25 milhoes nesse plano em dois meses, com prejuizo. Versoes conflitantes sobre a causa: a Alpha alega que a NinjaTrader viu sua plataforma propria (AlphaTrader) como ameaca competitiva; a NinjaTrader, segundo e-mails amplamente circulados, alegou mais de tres meses de obrigacoes contratuais nao pagas.","consequencia":"Prop Firm Match e PickAPropFirm delistaram a Alpha Futures no mesmo dia. A firma nao anunciou encerramento e migrou as contas para a plataforma propria AlphaTrader.","fonte":"https://phidiaspropfirm.com/education/alpha-futures-ninjatrader-tradovate","fonteSecundaria":"https://x.com/PropFirmMatch/status/2076609939905065422","visto":"2026-07-19"},{"tipo":"ATRASO_DE_PAGAMENTO","firma":"The5ers","data":"2026-03","gravidade":"MEDIA-ALTA","descricao":"Em marco/2026 a firma reconheceu PUBLICAMENTE, em sua conta oficial no X/Twitter, atrasos de pagamento: 'We are addressing recent payout delays and recognize that some payments are taking longer than expected.' Relatos documentados no Forex Peace Army e Reddit descrevem atrasos de 1-2 semanas ou mais, status 'approved but pending' prolongado, saques aprovados e depois negados retroativamente, KYC previamente aprovado sendo marcado como 'Verification Failed', e contas desativadas sem explicacao. Caso relatado: trader canadense com ~USD 22k em lucros pediu saque em 13/03/2026, esperou 13 dias e teve o payout negado com a conta desativada. Outro caso: USD 3.099 negados e conta fechada apos 4 saques bem-sucedidos somando USD 10.422.","contexto":"A firma segue operando normalmente e com Trustpilot 4.8. Trata-se de sinal de deterioracao operacional, nao de insolvencia declarada.","fonte":"https://propfirmgeeks.com/blogs/the-5-ers-payout-crisis-a-deep-dive-into-rejected-payouts-delays-and-account-terminations","fonteSecundaria":"https://www.forexpeacearmy.com/community/threads/problem-the5ers-payout-3-099-declined-account-closed-no-explanation-after-4-successful-payouts-totaling-10-422.89364/","visto":"2026-07-19"},{"tipo":"ENCERRAMENTO","firma":"ATFunded (ATFX)","data":"2026-06","gravidade":"MEDIA","descricao":"A corretora ATFX encerrou sua unidade de prop trading ATFunded, lancada no inicio de 2025. O CEO Josh Dentrinos e depois o gerente-geral Connor Mccourt deixaram a empresa. A firma anunciou 'pausar operacoes' com o MT5 fechando as 13:00 EST no mesmo dia do anuncio, citando a necessidade de 'pause, stabilise, and evaluate alternative models' apos concluir que os 'current models' nao eram sustentaveis a longo prazo.","mitigacao":"A empresa comprometeu-se a reembolsar integralmente todos os clientes com contas ativas e a pagar todos os traders financiados com lucros elegiveis conforme as regras.","fonte":"https://fxnewsgroup.com/forex-news/retail-forex/atfx-shutters-prop-trading-unit-atfunded/","visto":"2026-07-19"},{"tipo":"ENCERRAMENTO","firma":"SurgeTrader","data":"2024-05-24","gravidade":"ALTA","descricao":"Firma sediada na Florida, fundada em 2021, cessou operacoes apos a Match-Trade Technologies revogar sua licenca de plataforma, citando 'inability to fulfill the formal obligations specified in our contract'. Antes disso ja havia perdido acesso ao MetaTrader na repressao da MetaQuotes. Ha registro de payouts devidos na ocasiao. Estava na lista de candidatas do levantamento e esta ENCERRADA ha mais de dois anos.","evidenciaDireta":"surgetrader.com hoje faz redirect para afternic.com - dominio estacionado e a venda (verificado 2026-07-19).","fonte":"https://www.financemagnates.com/forex/prop-firm-surgetrader-shuts-down-a-week-after-losing-match-trader-license/","visto":"2026-07-19"},{"tipo":"ENCERRAMENTO","firma":"Propel Capital","data":"2025-08-19","gravidade":"MEDIA","descricao":"Encerrou apos 14 meses de operacao, citando 'concorrencia acirrada'.","fonte":"https://bestprops.com/graveyard/closed-prop-firms/","visto":"2026-07-19"},{"tipo":"ENCERRAMENTOS_HISTORICOS","firma":"Diversas (2024)","data":"2024","gravidade":"CONTEXTO","descricao":"Onda de fechamentos anterior a janela de 24 meses, relevante como contexto: The Funded Trader (28/03/2024, pausa apos negacao em massa de payouts, USD 2M+ negados apenas em jan-fev/2024); True Forex Funds (13/05/2024, insolvencia declarada, ~300 traders e ~USD 1,2M nao pagos); Funded Engineer (15/07/2024, falencia apos alegacoes de fraude); Funds For Traders (15/08/2024, saida da Eightcap); Smart Prop Trader (28/11/2024, encerramento ordenado honrando payouts ate 29/12/2024); Ascetic Capital (03/12/2024, fechou uma semana apos o lancamento); Karma Prop Traders (problemas de liquidez, fechou apos dois meses); Indigo Trader Funding (disputas de payout).","fonte":"https://thepropfirmguide.com/prop-firms-that-shut-down/","visto":"2026-07-19"},{"tipo":"PROCESSO_JUDICIAL","firma":"Apex Trader Funding","data":"2024-12-18","gravidade":"ALTA","descricao":"Riot et al v. Apex Trader Funding Inc. et al, caso 1:24-cv-01557, Distrito Oeste do Texas. Leo Riot, cofundador e ex-CTO da Apex, alega quebra de contrato de licenciamento de tecnologia, afirmando ter desenvolvido a infraestrutura de trading da firma e ter direito a 33% do lucro liquido, sem pagamentos desde julho/2024. Ha audiencia para decidir, entre outros pontos, SE A APEX PODE CONTINUAR USANDO A TECNOLOGIA que opera sua infraestrutura. Movimentacao processual registrada ate 01/07/2026, sem acordo anunciado.","fonte":"https://www.courtlistener.com/docket/69479853/riot-v-apex-trader-funding-inc/","visto":"2026-07-19"},{"tipo":"PROCESSO_REGULATORIO","firma":"MyForexFunds / Traders Global Group","data":"2025-05-13","gravidade":"MARCO_SETORIAL","descricao":"Reversao do caso mais importante da historia do setor. O juiz federal Edward S. Kiel julgou improcedente COM PREJUIZO a acao de fraude da CFTC (que alegava mais de USD 300 milhoes) contra a Traders Global Group, controladora da MyForexFunds, em ordem assinada em 13/05/2025. O tribunal impos sancoes da Regra 11 de mais de USD 3,1 milhoes em honorarios contra a propria CFTC por ma conduta deliberada. A base da dismissal foi a caracterizacao incorreta pela CFTC de uma transferencia de CAD 31,55 milhoes que, na realidade, eram pagamentos legitimos de imposto corporativo a Canada Revenue Agency - fato que a CFTC conhecia pelo menos uma semana antes de pedir o congelamento de ativos. Em maio/2025 a CFTC colocou quatro advogados e um investigador em licenca administrativa por potenciais violacoes eticas.","impacto":"A empresa sinalizou intencao de retorno. O caso esfriou o apetite regulatorio dos EUA por acoes agressivas contra prop firms, mas NAO estabeleceu que o modelo e licito - foi decidido por ma conduta processual, nao pelo merito.","fonte":"https://www.financemagnates.com/forex/my-forex-funds-parent-defeats-cftc-in-court-as-judge-imposes-sanctions/","visto":"2026-07-19"},{"tipo":"RESTRICAO_REGULATORIA_EUA","firma":"Setorial (Spotware/cTrader)","data":"2026-Q1","gravidade":"ALTA","descricao":"Apos 'uma avaliacao regulatoria interna' no primeiro trimestre de 2026, a Spotware restringiu o onboarding de traders baseados nos EUA na plataforma cTrader para prop firms. Efeitos escalonados: FundedNext a partir de 31/03/2026; Goat Funded Trader alterou os termos em abril/2026; The5ers atualizou suas diretrizes em junho/2026, classificando o cTrader como opcao restrita exclusivamente a clientes nao americanos. Traders americanos foram direcionados a Match-Trader, TradeLocker e Volumetrica.","fonte":"https://www.financemagnates.com/forex/ctrader-restricts-us-prop-firm-access-following-internal-regulatory-assessment/","visto":"2026-07-19"},{"tipo":"RESTRICAO_REGULATORIA_EUA","firma":"City Traders Imperium","data":"2025-06-07","gravidade":"MEDIA","descricao":"A CTI suspendeu o onboarding e a compra de contas por residentes dos EUA: 'CTI has to suspend onboarding and purchasing for individuals residing in the US'. Clientes existentes continuam operando normalmente. Blueberry Funded tambem mantem os EUA em lista de restricao total.","fonte":"https://forexpropreviews.com/city-traders-imperium-no-longer-accepting-us-clients/","visto":"2026-07-19"},{"tipo":"REGULACAO_BRASIL","firma":"Atom (caso CVM)","data":"2025-12-05","gravidade":"MEDIA","descricao":"UNICO precedente regulatorio brasileiro relevante identificado. A CVM levou a Atom, uma prop firm de capital aberto, ao judiciario argumentando que a empresa oferecia servicos de corretagem ilicitos em vez de prop trading legitimo. O argumento central: a Atom oferecia contas REAIS na fase financiada, nas quais o valor que o trader podia perder era proximo ou inferior ao que ele havia pago pela conta; se o trader ultrapassasse o limite, tinha de ressarcir a firma e pagar por nova conta - 'a Atom nao tinha risco de baixa porque a taxa cobria o que o trader poderia perder'. A firma ainda marcava comissoes sobre trades reais. A CVM VENCEU o caso.","alcanceLimitado":"O precedente nao afetou significativamente o setor, porque a maioria das prop firms estrutura a oferta de forma diferente, com contas SIMULADAS em vez de reais. O Brasil segue em zona cinzenta: a atividade de trading simulado na uma corrida por verificacao independente.","fonte":"https://www.financemagnates.com/forex/us-prop-firms-are-now-moving-inside-the-cftc-perimeter-an-opportunity-or-a-survival-strategy/","fonteSecundaria":"https://www.financemagnates.com/forex/analysis/hola-prime-brings-in-deloitte-to-audit-payouts-as-trust-gap-widens-across-prop-firms/","visto":"2026-07-19"},{"tipo":"RISCO_DE_PLATAFORMA","firma":"Setorial (ProjectX / NinjaTrader)","data":"2026-02","gravidade":"ALTA","descricao":"Risco de contraparte tecnologica tornou-se a principal ameaca operacional das firmas de futuros. A ProjectX encerrou seu 'third-party service offering' no fim de fevereiro/2026, tornando-se exclusiva da Topstep sob a marca TopstepX. A justificativa oficial: 'shifts in operational demands and upcoming compliance reporting, oversight, and audit requirements have made continuing third-party support no longer sustainable.' A tecnologia alimentava os dashboards de Bulenox, Tradeify, Lucid Trading, Alpha Futures, Phidias e TradeDay - todas tiveram de reconstruir sobre Tradovate ou Rithmic em semanas. Em 12/07/2026 a NinjaTrader rescindiu com a Alpha Futures. Precedente anterior: a saida da Eightcap e a revogacao de licencas pela MetaQuotes em 2024 mataram sozinhas varias firmas.","fonte":"https://www.financemagnates.com/forex/prop-firms-report-futures-prop-tech-provider-projectx-to-end-its-third-party-service-offering/","visto":"2026-07-19"},{"tipo":"INTEGRIDADE_DE_AVALIACOES","firma":"Setorial","data":"2026","gravidade":"MEDIA-ALTA","descricao":"39 de 151 firmas verificadas tiveram a nota do Trustpilot SUSPENSA por avaliacoes falsas - cerca de 26% das firmas diretamente verificadas. Caso documentado: a Hola Prime lancou em outubro ou novembro de 2024 hospedando avaliacoes no Trustpilot datadas de maio de 2024, antes de a firma existir; foram citadas 1.300 avaliacoes falsas. Entre as firmas deste levantamento, Blueberry Funded esta atualmente com a nota suprimida por quebra de diretrizes e Goat Funded Trader tem flag publico de quebra de diretrizes com remocao de avaliacoes falsas. Uma nota alta no Trustpilot, isoladamente, nao e evidencia confiavel de idoneidade.","fonte":"https://proptradingvibes.com/state-of-prop-trading","fonteSecundaria":"https://www.myforexfirms.com/blogs/prop-firm-scams-to-avoid","visto":"2026-07-19"},{"tipo":"REGULACAO_EUROPA","firma":"Setorial","data":"2026-06-19","gravidade":"MEDIA","descricao":"Situacao regulatoria europeia em 2026, com o que foi possivel confirmar: o Czech National Bank foi o primeiro regulador da UE a declarar publicamente que prop trading 'may be subject to MiFID' dependendo do modelo de negocio. A ESMA sinalizou que a mecanica de payout pode trazer alguns modelos para dentro do perimetro de servicos de investimento. BaFin (Alemanha) e Consob (Italia) emitiram alertas ao investidor sobre CFDs de alta alavancagem comercializados por prop firms. FCA (Reino Unido), ESMA e ASIC (Australia) mantem teto de alavancagem de 30:1 para varejo; a NFA mantem 50:1 nos EUA. A tese central dos reguladores: a defesa da 'conta simulada' ja nao basta - examina-se a substancia economica, quem assume o risco e se o profit-sharing constitui atividade de aconselhamento regulada.","ressalva":"NAO foi possivel confirmar nenhuma acao regulatoria europeia concreta e datada contra prop firms especificas dentro da janela examinada. Ver avisoDeFonte no bloco meta.","fonte":"https://theindustryspread.com/retail-prop-trading-regulation-2026-my-forex-funds-cftc/","visto":"2026-07-19"}];

<script>
/* ═══════════════════════════════════════════════════════════════
   CAMADA MÓVEL — estado, gestos e blocos
   ═══════════════════════════════════════════════════════════════ */

const VIEWS=[
  {id:"painel",   ic:"◧", lb:"Painel"},
  {id:"graficos", ic:"◨", lb:"Gráficos"},
  {id:"robo",     ic:"⚙", lb:"Robô"},
  {id:"mesas",    ic:"▤", lb:"Mesas"},
  {id:"mercado",  ic:"◈", lb:"Mercado"},
  {id:"social",   ic:"◍", lb:"Social"},
  {id:"historico",ic:"▦", lb:"Histórico"},
  {id:"relogios", ic:"◷", lb:"Relógios"},
  {id:"alertas",  ic:"◉", lb:"Alertas"},
  {id:"dados",    ic:"◎", lb:"Dados"}
];
const PRIMARY=["painel","graficos","robo","mesas"];

const M={
  vi:0,                       /* índice da vista */
  mode:"navegar",
  tf:"1h",
  focus:"BTCUSDT",
  charts:["BTCUSDT","ETHUSDT","EURUSD","XAUUSD"],
  weights:{ema:25,rsi:15,macd:20,bb:10,adx:15,atr:15},
  buyTh:35, sellTh:35,
  filtros:{h1:8,m1:0,h2:20,m2:0,gmt:0,dow:new Set([1,2,3,4,5]),
           dom:"1-31",mon:"1-12",y1:2024,y2:2030,sess:"all",black:"",
           closeEnd:true,closeFri:true},
  risco:{mode:"risk",rv:1,sl:2,tp:3,tr:1.5,be:1,dl:3,dg:6,mp:1,md:5,sp:25},
  ea:{name:"MesaEA",magic:880421,sym:"BTCUSDT",tf:"H1",plat:"mql5"},
  layout:{}, off:new Set()
};
/* o painel principal também usa o nome S no motor compartilhado */
const S={tf:"1h",focus:"BTCUSDT",charts:M.charts,weights:M.weights,buyTh:35,sellTh:35,snap:{}};

const buzz=ms=>{try{navigator.vibrate&&navigator.vibrate(ms);}catch(_){}};

/* ── persistência tolerante (armazenamento pode estar barrado) ── */
const store={
  get(k,d){try{const v=localStorage.getItem("mesa."+k);return v?JSON.parse(v):d;}catch(_){return d;}},
  set(k,v){try{localStorage.setItem("mesa."+k,JSON.stringify(v));}catch(_){}}
};

/* ── aviso flutuante ────────────────────────────────────────── */
function toast(t,m,ms=3600){
  const n=el("div","tst");
  n.append(el("div","tst-t",t),el("div","tst-m",m));
  $("#toast").append(n);
  setTimeout(()=>{n.style.transition="opacity .25s";n.style.opacity="0";
    setTimeout(()=>n.remove(),260);},ms);
}

/* ═══════════════ FOLHA INFERIOR ═══════════════ */
const sheet=$("#sheet"), sheetBd=$("#sheetbd");
let sheetOpen=false;
function openSheet(eyebrow,title,build){
  $("#sheet-e").textContent=eyebrow;
  $("#sheet-t").textContent=title;
  const b=$("#sheet-b"); b.innerHTML=""; b.scrollTop=0;
  build(b);
  sheet.classList.add("on"); sheetBd.classList.add("on"); sheetOpen=true;
}
function closeSheet(){sheet.classList.remove("on");sheetBd.classList.remove("on");sheetOpen=false;}
sheetBd.onclick=closeSheet;

/* arrastar a alça para baixo fecha */
(function(){
  const g=$("#sheetg"); let y0=0,dy=0,on=false;
  g.addEventListener("pointerdown",e=>{on=true;y0=e.clientY;dy=0;
    sheet.style.transition="none";g.setPointerCapture(e.pointerId);});
  g.addEventListener("pointermove",e=>{
    if(!on)return; dy=Math.max(0,e.clientY-y0);
    sheet.style.transform=`translateY(${dy}px)`;});
  g.addEventListener("pointerup",()=>{
    if(!on)return; on=false; sheet.style.transition=""; sheet.style.transform="";
    if(dy>90){closeSheet();buzz(8);}});
})();

function sheetItem(parent,{icon,title,sub,check,act}){
  const n=el("div","mi");
  n.append(el("span","mi-i",icon||"·"));
  const m=el("div"); m.style.flex="1";
  m.append(el("div","mi-t",title));
  if(sub)m.append(el("div","mi-s",sub));
  n.append(m);
  if(check!=null)n.append(el("span","mi-c",check?"✓":""));
  if(act)n.onclick=()=>{buzz(6);act();};
  parent.append(n);
  return n;
}

/* ═══════════════ MODOS ═══════════════ */
const MODE_HINT={
  navegar:"deslize p/ trocar",
  analisar:"arraste no gráfico",
  ajustar:"segure ⠿ p/ mover"
};
function setMode(m){
  M.mode=m;
  document.body.dataset.mode=m;
  $$("#modes .mode").forEach(b=>b.classList.toggle("on",b.dataset.m===m));
  $("#mode-h").textContent=MODE_HINT[m];
  buzz(10);
  if(m==="ajustar")toast("Modo ajustar","Arraste ⠿ para reordenar os blocos e × para ocultar. Vale para os gráficos também.");
  if(m==="analisar")toast("Modo analisar","Arraste sobre o gráfico para percorrer as velas. Dois dedos mudam a janela.");
}
$("#modes").onclick=e=>{const b=e.target.closest(".mode"); if(b)setMode(b.dataset.m);};
document.body.dataset.mode="navegar";

/* ═══════════════ NAVEGAÇÃO ═══════════════ */
const track=$("#track"), stage=$("#stage");
function buildTrack(){
  track.innerHTML="";
  track.style.width=(VIEWS.length*100)+"vw";
  VIEWS.forEach(v=>{
    const s=el("section","view"); s.dataset.v=v.id;
    s.append(el("div","blocks"));
    track.append(s);
  });
}
function buildTabs(){
  const bar=$("#tabbar"); bar.innerHTML="";
  PRIMARY.forEach(id=>{
    const v=VIEWS.find(x=>x.id===id);
    const b=el("button","tab"); b.dataset.v=id;
    b.append(el("span","tab-i",v.ic),el("span","tab-l",v.lb));
    b.onclick=()=>go(VIEWS.findIndex(x=>x.id===id));
    bar.append(b);
  });
  const more=el("button","tab"); more.dataset.v="__more";
  more.append(el("span","tab-i","⋯"),el("span","tab-l","Mais"));
  more.onclick=openMore;
  bar.append(more);
}
function openMore(){
  buzz(8);
  openSheet("Navegação","Todas as seções",b=>{
    VIEWS.forEach((v,i)=>sheetItem(b,{
      icon:v.ic,title:v.lb,
      sub:i===M.vi?"você está aqui":null,
      check:i===M.vi,
      act:()=>{closeSheet();go(i);}
    }));
    const sep=el("div","mi");
    sep.style.cssText="border-top:1px solid var(--rule);margin-top:6px";
    sep.append(el("span","mi-i","◐"),el("div","mi-t","Alternar tema"));
    sep.onclick=()=>{closeSheet();toggleTheme();};
    b.append(sep);
    sheetItem(b,{icon:"↺",title:"Restaurar blocos ocultos",
      sub:M.off.size?`${M.off.size} oculto(s)`:"nenhum oculto",
      act:()=>{M.off.clear();saveLayout();renderAll();closeSheet();
               toast("Restaurado","Todos os blocos voltaram.");}});
  });
}
function go(i,quiet){
  const n=clamp(i,0,VIEWS.length-1);
  if(n===M.vi&&quiet)return;
  M.vi=n;
  track.style.transition="transform .3s cubic-bezier(.32,.72,0,1)";
  track.style.transform=`translateX(${-n*100}vw)`;
  $("#top-sub").textContent=VIEWS[n].lb.toLowerCase();
  $$("#tabbar .tab").forEach(t=>t.classList.toggle("on",t.dataset.v===VIEWS[n].id));
  updateDots();
  if(!quiet)buzz(6);
  ensureView(VIEWS[n].id);
}
function updateDots(){
  $$(".dots").forEach(d=>$$("i",d).forEach((x,i)=>x.classList.toggle("on",i===M.vi)));
}

/* ── deslize horizontal entre seções ────────────────────────── */
(function(){
  let x0=0,y0=0,dx=0,dy=0,dir=null,active=false,t0=0;
  stage.addEventListener("pointerdown",e=>{
    if(M.mode==="ajustar")return;
    if(e.target.closest(".grip"))return;
    if(M.mode==="analisar"&&e.target.closest("canvas"))return;
    if(e.target.closest("input,select,textarea,.code"))return;
    active=true; dir=null; x0=e.clientX; y0=e.clientY; dx=dy=0; t0=performance.now();
    track.style.transition="none";
  });
  stage.addEventListener("pointermove",e=>{
    if(!active)return;
    dx=e.clientX-x0; dy=e.clientY-y0;
    if(!dir){
      if(Math.abs(dx)>10&&Math.abs(dx)>Math.abs(dy)*1.3)dir="x";
      else if(Math.abs(dy)>10)dir="y";
    }
    if(dir!=="x")return;
    e.preventDefault();
    /* borracha nas pontas: o painel resiste em vez de sair da tela */
    let d=dx;
    if((M.vi===0&&dx>0)||(M.vi===VIEWS.length-1&&dx<0))d=dx*0.28;
    track.style.transform=`translateX(calc(${-M.vi*100}vw + ${d}px))`;
  });
  const end=()=>{
    if(!active)return; active=false;
    if(dir!=="x"){track.style.transition="";return;}
    const vel=Math.abs(dx)/Math.max(1,performance.now()-t0);
    const limiar=innerWidth*0.24;
    if(dx<-limiar||(dx<-30&&vel>0.55))go(M.vi+1);
    else if(dx>limiar||(dx>30&&vel>0.55))go(M.vi-1);
    else{
      /* não passou do limiar: volta para onde estava */
      track.style.transition="transform .26s cubic-bezier(.32,.72,0,1)";
      track.style.transform=`translateX(${-M.vi*100}vw)`;
    }
  };
  stage.addEventListener("pointerup",end);
  stage.addEventListener("pointercancel",end);
})();

/* ── puxar para atualizar ───────────────────────────────────── */
(function(){
  const ptr=$("#ptr"); let y0=0,pull=0,armed=false,view=null;
  stage.addEventListener("pointerdown",e=>{
    view=e.target.closest(".view");
    armed=!!view&&view.scrollTop<=0&&M.mode!=="ajustar";
    y0=e.clientY; pull=0;
  });
  stage.addEventListener("pointermove",e=>{
    if(!armed||!view)return;
    pull=e.clientY-y0;
    if(pull<=0||view.scrollTop>0){ptr.style.opacity="0";return;}
    const d=Math.min(pull*0.42,62);
    ptr.style.opacity=String(Math.min(1,d/40));
    ptr.style.transform=`translateY(${d-14}px)`;
    view.style.transform=`translateY(${d*0.5}px)`;
  });
  const end=async()=>{
    if(!armed||!view){armed=false;return;}
    const v=view, d=pull; armed=false;
    v.style.transition="transform .24s"; v.style.transform="";
    setTimeout(()=>v.style.transition="",260);
    if(d*0.42>44){
      ptr.classList.add("go"); ptr.style.opacity="1"; buzz(12);
      await refreshData();
      ptr.classList.remove("go"); ptr.style.opacity="0"; ptr.style.transform="";
      toast("Atualizado", Feed.live?"Cotações recarregadas dos provedores.":"Sem rede: série de demonstração.");
    }else{ptr.style.opacity="0";ptr.style.transform="";}
  };
  stage.addEventListener("pointerup",end);
  stage.addEventListener("pointercancel",end);
})();

function toggleTheme(){
  const cur=document.documentElement.getAttribute("data-theme")
    ||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
  const next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  store.set("tema",next);
  redrawCharts();
}
$("#btn-theme").onclick=()=>{buzz(6);toggleTheme();};
(function(){const t=store.get("tema");if(t)document.documentElement.setAttribute("data-theme",t);})();
</script>

<script>
/* ═══════════════════════════════════════════════════════════════
   BLOCOS — a unidade que o usuário reordena e oculta
   ═══════════════════════════════════════════════════════════════ */
const BLOCKS={};   /* vista → [{id,e,t,build}] , preenchido adiante */

function saveLayout(){
  store.set("layout",M.layout);
  store.set("off",[...M.off]);
}
(function loadLayout(){
  M.layout=store.get("layout",{})||{};
  M.off=new Set(store.get("off",[])||[]);
})();

function ordem(vid){
  const defs=BLOCKS[vid]||[];
  const ids=defs.map(d=>d.id);
  const salvo=(M.layout[vid]||[]).filter(id=>ids.includes(id));
  const resto=ids.filter(id=>!salvo.includes(id));
  return [...salvo,...resto];
}

function blocoNode(def,vid){
  const art=el("article","blk"); art.dataset.id=def.id; art.dataset.v=vid;
  if(M.off.has(def.id))art.classList.add("off");

  const h=el("div","blk-h");
  const grip=el("div","grip","⠿"); grip.dataset.grip="1";
  h.append(grip, el("span","blk-e",def.e));
  if(def.t)h.append(el("span","blk-t",def.t));
  const x=el("button","blk-x"); x.textContent=M.off.has(def.id)?"+":"×";
  x.setAttribute("aria-label",M.off.has(def.id)?"Mostrar bloco":"Ocultar bloco");
  x.onclick=e=>{
    e.stopPropagation(); buzz(8);
    if(M.off.has(def.id))M.off.delete(def.id); else M.off.add(def.id);
    saveLayout(); renderView(vid);
  };
  h.append(x);
  art.append(h);

  const b=el("div","blk-b"+(def.flush?" flush":""));
  art.append(b);
  try{ def.build(b); }
  catch(err){ b.append(el("div","empty","Este bloco falhou ao montar.")); }
  return art;
}

function renderView(vid){
  const host=$(`.view[data-v="${vid}"] .blocks`);
  if(!host)return;
  host.innerHTML="";
  const defs=BLOCKS[vid]||[];
  if(!defs.length){host.append(el("div","empty","Seção em branco."));return;}
  ordem(vid).forEach(id=>{
    const def=defs.find(d=>d.id===id);
    if(def)host.append(blocoNode(def,vid));
  });
  /* pontos de página no fim de cada seção — orientação sem ocupar barra */
  const dots=el("div","dots");
  VIEWS.forEach((_,i)=>{const d=el("i"); if(i===M.vi)d.classList.add("on"); dots.append(d);});
  host.append(dots);
  montadas.add(vid);
}
const montadas=new Set();
function ensureView(vid){
  if(!montadas.has(vid))renderView(vid);   /* monta na primeira visita */
}
function renderAll(){montadas.clear(); VIEWS.forEach(v=>ensureView(v.id));}

/* ── arrastar para reordenar (modo ajustar) ─────────────────── */
(function(){
  let lift=null, host=null, y0=0, base=0, ids=null;

  stage.addEventListener("pointerdown",e=>{
    if(M.mode!=="ajustar")return;
    const g=e.target.closest(".grip"); if(!g)return;
    e.preventDefault();
    lift=g.closest(".blk"); host=lift.parentElement;
    y0=e.clientY; base=0;
    lift.classList.add("lift");
    g.setPointerCapture(e.pointerId);
    buzz(14);
  });

  stage.addEventListener("pointermove",e=>{
    if(!lift)return;
    e.preventDefault();
    base=e.clientY-y0;
    lift.style.transform=`translateY(${base}px)`;

    const meio=lift.getBoundingClientRect().top+lift.offsetHeight/2;
    const irmaos=[...host.children].filter(n=>n!==lift&&n.classList.contains("blk"));
    for(const s of irmaos){
      const r=s.getBoundingClientRect();
      const c=r.top+r.height/2;
      const antes=s.compareDocumentPosition(lift)&Node.DOCUMENT_POSITION_FOLLOWING;
      if(antes&&meio<c){ host.insertBefore(lift,s); reancorar(e.clientY); buzz(5); break; }
      if(!antes&&meio>c){ host.insertBefore(lift,s.nextSibling); reancorar(e.clientY); buzz(5); break; }
    }
  });

  /* Depois de mover o nó no DOM ele ocupa a nova posição de layout,
     então o deslocamento acumulado precisa voltar a zero — senão o
     bloco salta para longe do dedo. */
  function reancorar(clientY){
    y0=clientY; base=0;
    lift.style.transform="translateY(0px)";
  }

  const solta=()=>{
    if(!lift)return;
    lift.classList.remove("lift");
    lift.style.transform="";
    const vid=lift.dataset.v;
    M.layout[vid]=[...host.children].filter(n=>n.classList.contains("blk")).map(n=>n.dataset.id);
    saveLayout();
    lift=null; host=null;
    buzz(10);
  };
  stage.addEventListener("pointerup",solta);
  stage.addEventListener("pointercancel",solta);
})();

const cards=new Map();     /* símbolo → nó do cartão */

function chartCard(sym){
  const wrap=el("div","chart"); wrap.dataset.sym=sym;
  const h=el("div","chart-h");
  const nome=el("span","chart-s",bySym(sym).label);
  const pr=el("span","chart-p","—"), ch=el("span","chart-c","—");

  const cv=el("canvas");
  cv.style.height="188px";
  cv.dataset.sym=sym;
  cv._opts={ema:true,bb:false,ema50:false,sub:"none"};
  cv._bars=90;

  const scrub=el("div","scrub");
  wrap.append(h,cv,scrub);
  wrap._pr=pr; wrap._ch=ch; wrap._cv=cv; wrap._scrub=scrub;
  cards.set(sym,wrap);
  return wrap;
}

function pintar(cv,hover){
  const d=Feed.cache.get(cv.dataset.sym+M.tf);
  if(d)drawChart(cv,d,cv.dataset.sym,hover==null?null:hover);
}
function redrawCharts(){
  cards.forEach(w=>{ if(w.isConnected)pintar(w._cv,null); });
}

/* leitura da vela sob o dedo */
function mostrarScrub(wrap,idx){
  const cv=wrap._cv, sym=cv.dataset.sym;
  const c=Feed.cache.get(sym+M.tf); if(!c)return;
  const g=cv._geo; if(!g)return;
  const abs=g.start+idx;
  const s=snapshotAt(c,seriesFor(sym+M.tf,c),abs);
  const k=c[abs], d=new Date(k.t);
  const {score,warmup}=computeScore(s,M.weights);

  const box=wrap._scrub; box.innerHTML="";
  const top=el("div");
  top.style.cssText="display:flex;gap:8px;align-items:baseline;margin-bottom:5px";
  top.append(el("span",null,`${pad2(d.getDate())}/${pad2(d.getMonth()+1)} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`));
  const sc=el("span"); sc.style.marginLeft="auto";
  if(warmup){sc.className="chip mute";sc.textContent="aquecendo";}
  else{sc.className="chip "+(score>=M.buyTh?"long":score<=-M.sellTh?"short":"warn");
       sc.textContent=(score>0?"+":"")+nf(score,1);}
  top.append(sc);
  box.append(top);

  const grid=el("div","scrub-g");
  const par=(k2,v,cls)=>{
    grid.append(el("span","scrub-k",k2));
    const s2=el("span",cls||null); s2.textContent=v; s2.style.gridColumn="span 2"; grid.append(s2);
  };
  par("abre",price(k.o)); par("máx",price(k.h),"up"); par("mín",price(k.l),"dn");
  par("fecha",price(k.c),k.c>=k.o?"up":"dn");
  par("var",pct(s.chg),signCls(s.chg));
  par("RSI",nf(s.rsi,1)); par("MACD",nf(s.macdHist,4)); par("ATR",nf(s.atrPct,2)+"%");
  par("ADX",nf(s.adx,1)); par("BB",nf(s.bbPos,0)+"%");
  box.append(grid);
  box.classList.add("on");
}
function limparScrub(wrap){wrap._scrub.classList.remove("on");}

function idxAt(cv,clientX){
  const g=cv._geo; if(!g)return null;
  const r=cv.getBoundingClientRect();
  const x=clientX-r.left-g.padL;
  if(x<0||x>g.iw)return null;
  return clamp(Math.floor(x/g.cw),0,g.n-1);
}

/* percorrer, pinçar e segurar */
(function(){
  let cv=null, wrap=null, pressT=null, pinch=0, moved=false;

  const alvo=e=>{
    const c=e.target.closest("canvas"); if(!c)return null;
    return {cv:c, wrap:c.closest(".chart")};
  };

  stage.addEventListener("pointerdown",e=>{
    if(M.mode==="ajustar")return;
    const a=alvo(e); if(!a)return;
    cv=a.cv; wrap=a.wrap; moved=false;

    /* segurar abre a folha de ações do gráfico */
    pressT=setTimeout(()=>{
      if(!moved){buzz(16); folhaGrafico(cv); cv=null;}
    },480);

    if(M.mode==="analisar"){
      e.preventDefault();
      const i=idxAt(cv,e.clientX);
      if(i!=null){pintar(cv,i); mostrarScrub(wrap,i);}
      cv.setPointerCapture(e.pointerId);
    }
  });

  stage.addEventListener("pointermove",e=>{
    if(!cv)return;
    if(Math.abs(e.movementX||0)>2||Math.abs(e.movementY||0)>2)moved=true;
    if(M.mode!=="analisar")return;
    e.preventDefault();
    clearTimeout(pressT);
    const i=idxAt(cv,e.clientX);
    if(i!=null){pintar(cv,i); mostrarScrub(wrap,i);}
  });

  const fim=()=>{
    clearTimeout(pressT);
    if(cv&&M.mode==="navegar"&&wrap)limparScrub(wrap);
    cv=null; wrap=null;
  };
  stage.addEventListener("pointerup",fim);
  stage.addEventListener("pointercancel",fim);

  /* pinça nativa: dois toques mudam a janela de velas */
  stage.addEventListener("touchstart",e=>{
    if(e.touches.length!==2)return;
    const c=e.target.closest("canvas"); if(!c)return;
    pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                     e.touches[0].clientY-e.touches[1].clientY);
    c._pinchBars=c._bars;
  },{passive:true});
  stage.addEventListener("touchmove",e=>{
    if(e.touches.length!==2||!pinch)return;
    const c=e.target.closest("canvas"); if(!c)return;
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    const alvoBars=clamp(Math.round(c._pinchBars*(pinch/d)),30,240);
    const passo=[45,90,180].reduce((a,b)=>Math.abs(b-alvoBars)<Math.abs(a-alvoBars)?b:a);
    if(passo!==c._bars){c._bars=passo; pintar(c,null); buzz(6);}
  },{passive:false});
  stage.addEventListener("touchend",e=>{if(e.touches.length<2)pinch=0;},{passive:true});
})();

/* folha de ações do gráfico — o equivalente móvel do botão direito */
function folhaGrafico(cv){
  const sym=cv.dataset.sym, o=cv._opts;
  const redraw=()=>{pintar(cv,null);};
  openSheet("Gráfico",bySym(sym).label,b=>{
    sheetItem(b,{icon:"◈",title:"Analisar última vela",
      sub:"manda para o motor de sinal",
      act:()=>{closeSheet(); M.focus=sym; S.focus=sym; renderView("painel");
               go(0); toast(bySym(sym).label,"Motor de sinal apontado para este instrumento.");}});
    sheetItem(b,{icon:"⧉",title:"Copiar leitura",
      sub:"OHLC e todos os indicadores",act:()=>{closeSheet();copiarLeitura(sym);}});

    b.append(cabecalhoFolha("Sobreposições"));
    sheetItem(b,{icon:"∿",title:"Médias EMA 9 / 21",check:o.ema,
      act:()=>{o.ema=!o.ema;redraw();folhaGrafico(cv);}});
    sheetItem(b,{icon:"∿",title:"EMA 50 · tendência",check:o.ema50,
      act:()=>{o.ema50=!o.ema50;redraw();folhaGrafico(cv);}});
    sheetItem(b,{icon:"◫",title:"Bandas de Bollinger",check:o.bb,
      act:()=>{o.bb=!o.bb;redraw();folhaGrafico(cv);}});

    b.append(cabecalhoFolha("Subpainel"));
    Object.entries(SUBS).forEach(([k,v])=>sheetItem(b,{icon:"▁",title:v.n,check:o.sub===k,
      act:()=>{o.sub=k;redraw();folhaGrafico(cv);}}));

    b.append(cabecalhoFolha("Janela"));
    [[45,"45 velas"],[90,"90 velas"],[180,"180 velas"]].forEach(([n,l])=>
      sheetItem(b,{icon:"↔",title:l,check:cv._bars===n,
        act:()=>{cv._bars=n;redraw();folhaGrafico(cv);}}));

    b.append(cabecalhoFolha("Ir para"));
    sheetItem(b,{icon:"◈",title:"Notícias deste instrumento",
      act:()=>{closeSheet(); M.newsFiltro=sym; renderView("mercado");
               go(VIEWS.findIndex(v=>v.id==="mercado"));}});
    sheetItem(b,{icon:"▦",title:"Histórico deste instrumento",
      act:()=>{closeSheet(); M.histSym=sym; renderView("historico");
               go(VIEWS.findIndex(v=>v.id==="historico"));}});
    sheetItem(b,{icon:"⚙",title:"Gerar robô para "+bySym(sym).label,
      act:()=>{closeSheet(); M.ea.sym=sym; renderView("robo");
               go(VIEWS.findIndex(v=>v.id==="robo"));
               toast("Robô","Construtor preenchido com "+bySym(sym).label+".");}});
  });
}
function cabecalhoFolha(t){
  const n=el("div","sheet-e",t);
  n.style.cssText="padding:12px 14px 6px;border-top:1px solid var(--rule)";
  return n;
}
function copiarLeitura(sym){
  const c=Feed.cache.get(sym+M.tf); if(!c)return;
  const s=snapshotAt(c,seriesFor(sym+M.tf,c),c.length-1), k=c[c.length-1];
  const d=new Date(k.t);
  const txt=`${bySym(sym).label} · ${M.tf.toUpperCase()} · ${pad2(d.getDate())}/${pad2(d.getMonth()+1)} ${pad2(d.getHours())}:${pad2(d.getMinutes())}
OHLC      ${price(k.o)} / ${price(k.h)} / ${price(k.l)} / ${price(k.c)}
EMA 9/21  ${price(s.ema9)} / ${price(s.ema21)}
RSI 14    ${nf(s.rsi,1)}
MACD hist ${nf(s.macdHist,5)}
ATR 14    ${nf(s.atr,5)} (${nf(s.atrPct,2)}%)
ADX 14    ${nf(s.adx,1)}
Score     ${nf(computeScore(s,M.weights).score,1)}`;
  (navigator.clipboard?navigator.clipboard.writeText(txt):Promise.reject())
    .then(()=>toast("Copiado","Leitura da vela na área de transferência."))
    .catch(()=>toast("Não deu","O navegador bloqueou a cópia."));
}

<script>

const linha=(host,{t,s,v,vc,chip,act,a})=>{
  const r=el("div","row");
  const m=el("div","row-m");
  m.append(el("div","row-t",t));
  if(s)m.append(el("div","row-s",s));
  r.append(m);
  if(chip)r.append(el("span","chip "+(chip[1]||""),chip[0]));
  if(v!=null)r.append(el("span","row-v "+(vc||""),v));
  if(a)r.append(el("span","row-a",a));
  if(act)r.onclick=()=>{buzz(5);act();};
  host.append(r); return r;
};
const campo=(host,rot,node,dica)=>{
  const f=el("div","f");
  const l=el("label","f-l",rot); l.htmlFor=node.id||""; f.append(l,node);
  if(dica)f.append(el("span","f-h",dica));
  host.append(f); return node;
};
const inp=(tipo,val,onch)=>{
  const n=el("input"); n.type=tipo; n.value=val;
  n.oninput=()=>onch(n.value); return n;
};
const sel=(opts,val,onch)=>{
  const n=el("select");
  opts.forEach(([v,l])=>{const o=el("option",null,l);o.value=v;if(String(v)===String(val))o.selected=true;n.append(o);});
  n.onchange=()=>onch(n.value); return n;
};

      const n=el("div","st");

      n.append(el("div","st-d",d)); g.append(n);

    st("Último resultado",money(ult,0),POS.length+" posição(ões) aberta(s)",signCls(ult));
    st("Drawdown",nf(TRADES._maxDD,1)+"%",TRADES._maxDD>20?"acima do confortável":"tolerável",
       TRADES._maxDD>20?"dn":"fl");

       s.pf>=1.3?"up":s.pf>=1?"fl":"dn");
    st("Acerto",nf(s.wr,1)+"%",`${s.n} operações`,"fl");

  {id:"sinal",e:"Motor de sinal",t:"",build(b){

    if(!c){b.append(el("div","empty","Carregando cotações…"));return;}
    const s=snapshotAt(c,seriesFor(M.focus+M.tf,c),c.length-1);

    const nm=el("span"); nm.style.cssText="font-family:var(--serif);font-size:16px";

    top.append(el("span","chip "+lab[1],lab[0]));
    b.append(top);

    const g=el("div","gauge");
    const f=el("div","gauge-f"), w=Math.abs(score)/2;
    f.style.left=score>=0?"50%":(50-w)+"%"; f.style.width=w+"%";
    f.style.background=score>=M.buyTh?tok("--long"):score<=-M.sellTh?tok("--short"):tok("--fg-3");

    g.append(f,el("div","gauge-m"),t1,t2); b.append(g);

    const esc=el("div","note");
    esc.style.cssText="display:flex;justify-content:space-between";

    b.append(esc);

    const forte=[...parts].filter(p=>p.w>0).sort((a,b2)=>Math.abs(b2.v*b2.w)-Math.abs(a.v*a.w))[0];
    if(forte){

             v:nf(s.rsi,1),vc:s.rsi>70?"dn":s.rsi<30?"up":"fl"});
    linha(r,{t:"MACD histograma",s:s.macdHist>s.macdHistPrev?"expandindo":"contraindo",

    linha(r,{t:"ATR 14",s:nf(s.atrPct,2)+"% do preço",v:nf(s.atr,4)});

  {id:"noticias-mini",e:"Notícias",t:"da carteira",flush:true,build(b){
    const r=el("div","rows");

      const [lb,cls]=toneChip(n.tone);
      linha(r,{t:n.t,s:bySym(n.sym).label+" · demonstração",chip:[lb,cls],
        act:()=>toast(bySym(n.sym).label,n.x,6000)});

function rebuildChartBlocks(){

        const n=el("div","day"+(M.tf===v?" on":""),l);
        n.onclick=()=>{if(M.tf===v)return;buzz(8);M.tf=v;S.tf=v;refreshData();};
        g.append(n);
      });
      b.append(g);
      const nota=el("div","note"); nota.style.marginTop="9px";
      nota.textContent=M.tf==="1d"
        ? "No diário, câmbio vem do BCE — preço real de fechamento."
        : "Câmbio real só existe no diário; abaixo disso a série é sintética.";
      b.append(nota);
    }},
    ...M.charts.map((sym,i)=>({
      id:"g-"+sym, e:bySym(sym).seg, t:bySym(sym).label, flush:true,
      build(b){
        const card=chartCard(sym);
        b.append(card);
        requestAnimationFrame(()=>{
          pintar(card._cv,null);
          const d=Feed.cache.get(sym+M.tf);
          if(d){
            const last=d[d.length-1], prev=d[d.length-2];
            const ch=(last.c/prev.c-1)*100;
            card._pr.textContent=price(last.c);
            card._ch.textContent=pct(ch);
            card._ch.className="chart-c num "+signCls(ch);
          }
        });
      }
    })),
    {id:"add",e:"Instrumentos",t:"",build(b){
      const btn=el("button","btn wide","Escolher os quatro gráficos");
      btn.onclick=()=>{buzz(6);openSheet("Gráficos","Instrumentos em exibição",box=>{
        const nota=el("div","note"); nota.style.padding="10px 14px";
        nota.textContent="Toque para trocar. No modo Ajustar, arraste ⠿ para reordenar os gráficos.";
        box.append(nota);
        BOOK.forEach(o=>{
          const on=M.charts.includes(o.sym);
          sheetItem(box,{icon:"◆",title:o.label,sub:o.seg,check:on,act:()=>{
            if(on){
              if(M.charts.length<=1){toast("Mínimo","Deixe ao menos um gráfico.");return;}
              M.charts=M.charts.filter(x=>x!==o.sym);
            }else{
              if(M.charts.length>=4)M.charts.shift();
              M.charts.push(o.sym);
            }
            S.charts=M.charts; store.set("charts",M.charts);
            rebuildChartBlocks(); renderView("graficos");
            refreshData(); closeSheet();
          }});
        });
      });};
      b.append(btn);
    }}
  ];
}

function renderRank(host){
  host=host||$("#ms-rank"); if(!host)return;
  host.innerHTML="";
  const tot=Object.values(msW).reduce((a,b)=>a+b,0);
  if(tot===0){host.append(el("div","empty","Todos os pesos em zero — suba algum critério."));return;}
  const rows=MESAS.map(m=>({m,...msScore(m)})).sort((a,b)=>b.score-a.score);
  rows.forEach((r,i)=>{
    const m=r.m;
    const n=linha(host,{
      t:`${i+1}. ${m.nome}`,
      s:`${m.programaRef} · ${m.tipoDD==="estatico"?"DD estático":m.tipoDD==="misto"?"DD trava depois":m.tipoDD==="trailing"?"DD rastreável":"DD não publicado"}`,
      v:nf(r.score,1), a:"›",
      act:()=>fichaMesa(r)
    });
    n.classList.add("sev",m.bandeira==="grave"?"no":m.bandeira==="atencao"?"hold":"ok");
    const v=$(".row-v",n);
    v.style.color=r.score>=70?"var(--long)":r.score>=55?"var(--brass)":"var(--short)";
  });
}
function fichaMesa(r){
  const m=r.m;
  openSheet("Ficha",m.nome,box=>{
    const dec=el("div"); dec.style.padding="10px 14px 4px";
    MS_CRIT.forEach(([k,nome])=>{
      const row=el("div"); row.style.cssText="margin-bottom:9px";
      const t=el("div"); t.style.cssText="display:flex;font-size:12px;margin-bottom:3px";
      t.append(el("span",null,nome));
      const val=el("span","num"); val.style.marginLeft="auto";
      val.textContent=nf(r.n[k],0)+" ×"+msW[k]; t.append(val);
      row.append(t);
      const bar=el("div"); bar.style.cssText="height:4px;background:var(--sunk);border-radius:2px;overflow:hidden";
      const f=el("div"); f.style.cssText=`height:100%;width:${r.n[k]}%;background:${
        r.n[k]>=70?"var(--long)":r.n[k]>=45?"var(--brass)":"var(--short)"}`;
      bar.append(f); row.append(bar);
      row.append(el("div","row-s",r.por[k]));
      dec.append(row);
    });
    box.append(dec);

    const rows=el("div","rows");
    [["Programa comparado",m.programaRef],["Sede",m.sede],["Fundação",m.fundacao||"—"],
     ["Fases",m.fases===0?"conta imediata":m.fases+" fase(s)"],
     ["Meta total",m.metaTotal==null?"não publicada":m.metaTotal+"%"],
     ["Drawdown total",m.ddTotal==null?"—":m.ddTotal+"%"],
     ["Drawdown diário",m.ddDiario==null?"sem limite diário":m.ddDiario+"%"],
     ["Divisão",m.divisao==null?"—":m.divisao+"%"],
     ["Taxa 100 mil",m.taxa100k==null?"não publicada":money(m.taxa100k,0)],
     ["Reembolso",m.reembolsavel===true?"sim":m.reembolsavel==="parcial"?"parcial":m.reembolsavel===false?"não":"—"],
     ["Prazo",m.prazoMax==null?"sem prazo":m.prazoMax+" dias"],
     ["Consistência",m.consistencia?"sim":m.consistencia===false?"não":"—"],
     ["Brasil",m.aceitaBrasil===true?"aceita":m.aceitaBrasil===false?"não aceita":"não publicado"],
     ["Confiança do dado",m.confiancaDado]
    ].forEach(([k,v])=>linha(rows,{t:k,v:String(v)}));
    box.append(rows);

    if(m.bandeiraTxt){
      const w=el("div","sev "+(m.bandeira==="grave"?"no":"hold"));
      w.style.cssText="padding:11px 14px;margin-top:8px";
      w.append(el("span","chip "+(m.bandeira==="grave"?"short":"warn"),
        m.bandeira==="grave"?"bandeira vermelha":"sinal de atenção"));
      w.append(el("div","row-s",m.bandeiraTxt));
      box.append(w);
    }
    if(m.tipoDDTxt){
      const d=el("div"); d.style.padding="10px 14px";
      d.append(el("div","f-l","Drawdown"),el("div","row-s",m.tipoDDTxt));
      box.append(d);
    }
    const f=el("div"); f.style.padding="10px 14px 16px";
    const a=el("a"); a.href=m.fonte; a.target="_blank"; a.rel="noopener noreferrer";
    a.textContent=m.fonte; a.style.cssText="color:var(--brass);font-family:var(--mono);font-size:10px;word-break:break-all";
    f.append(el("div","note","Fonte · lido em "+m.visto),a);
    box.append(f);
  });
}
</script>

function cfgMobile(){
  const f=M.filtros, r=M.risco;
  return{
    name:(M.ea.name||"MesaEA").replace(/[^\w]/g,""), magic:+M.ea.magic||880421,
    sym:M.ea.sym, tf:M.ea.tf, plat:M.ea.plat,
    w:M.weights, buy:M.buyTh, sell:M.sellTh,
    mode:r.mode, rv:r.rv, sl:r.sl, tp:r.tp, tr:r.tr, be:r.be,
    dl:r.dl, dg:r.dg, mp:r.mp, md:r.md, sp:r.sp,
    f:{...f, black:f.black||""},
    dow:d=>f.dow.has(d)?"true":"false",
    stamp:new Date().toISOString().slice(0,16).replace("T"," ")
  };
}
let CODIGO="", CODNOME="";
function gerar(){
  const c=cfgMobile();
  CODIGO=c.plat==="mql5"?genMQL5(c):genMQL4(c);
  CODNOME=`${c.name}.${c.plat==="mql5"?"mq5":"mq4"}`;
  return CODIGO;
}
async function salvar(nome,txt,ok){
  if(window.claude&&window.claude.downloads){
    try{await window.claude.downloads.save({filename:nome,data:txt});toast("Salvo",ok);return;}
    catch(e){if(e&&e.code==="declined"){toast("Cancelado","Download não autorizado.");return;}}
  }
  try{
    const u=URL.createObjectURL(new Blob([txt],{type:"text/plain;charset=utf-8"}));
    const a=el("a"); a.href=u; a.download=nome; a.click();
    setTimeout(()=>URL.revokeObjectURL(u),1500); toast("Salvo",ok);
  }catch(_){
    navigator.clipboard&&navigator.clipboard.writeText(txt);
    toast("Copiado","Download indisponível aqui — o texto foi para a área de transferência.");
  }
}

function histFiltrado(){
  const q=(M.histQ||"").trim().toLowerCase();
  const horas=parseList(M.histHora||"",0,23);
  return TRADES.filter(t=>{
    if((M.histSeg||"all")!=="all"&&t.seg!==M.histSeg)return false;
    if((M.histSym||"all")!=="all"&&t.sym!==M.histSym)return false;
    if((M.histSide||"all")!=="all"&&t.side!==M.histSide)return false;
    if(M.histRes==="win"&&t.pnl<=0)return false;
    if(M.histRes==="loss"&&t.pnl>0)return false;
    if(horas&&!horas.has(t.open.getHours()))return false;
    if(q&&!`${t.id} ${t.label} ${t.seg} ${t.side} ${t.ea} ${t.why}`.toLowerCase().includes(q))return false;
    return true;
  });
}
function renderHist(){
  const lista=histFiltrado(), s=stats(lista);
  const g=$("#h-stats");
  if(g){
    g.innerHTML="";
    const st=(l,v,d,c)=>{const n=el("div","st");n.append(el("div","st-l",l));
      const q=el("div","st-v "+(c||""));q.textContent=v;n.append(q,el("div","st-d",d));g.append(n);};
    st("Operações",nf(lista.length,0),`de ${TRADES.length} no total`);
    st("Resultado",money(s.pnl,0),`bruto ${money(s.gross,0)}`,signCls(s.pnl));
    st("Acerto",s.n?nf(s.wr,1)+"%":"—","no recorte");
    st("Fator de lucro",s.n?(isFinite(s.pf)?nf(s.pf,2):"∞"):"—",
       s.pf>=1.3?"o recorte se sustenta":"o recorte não se paga",s.pf>=1.3?"up":"dn");
  }
  const r=$("#h-rows");
  if(r){
    r.innerHTML="";
    if(!lista.length){r.append(el("div","empty","Nenhuma operação nesse recorte."));return;}
    [...lista].reverse().slice(0,80).forEach(t=>{
      const n=linha(r,{t:`${t.label} · ${t.side.toLowerCase()}`,
        s:`${fmtDT(t.open)} · ${t.ea.replace("MesaEA · ","")} · ${t.why}`,
        v:money(t.pnl),vc:signCls(t.pnl)});
      n.classList.add("sev",t.pnl>0?"ok":"no");
    });
    if(lista.length>80)r.append(el("div","empty",`Mostrando 80 de ${lista.length}. Aperte o recorte.`));
  }
}

async function testarConexoes(){
  const r=$("#cx-rows"); if(!r)return;
  const linhas=$$(".row",r);
  linhas.forEach(n=>{const c=$(".chip",n);c.textContent="testando";c.className="chip mute";});
  let ok=0;
  await Promise.all(linhas.map(async n=>{
    const p=PROVIDERS[n.dataset.k], t0=performance.now();
    const c=$(".chip",n);
    try{
      const res=await p.ping();
      c.textContent=Math.round(performance.now()-t0)+" ms"; c.className="chip long";
      $(".row-s",n).textContent=String(res); n.classList.add("sev","ok"); ok++;
    }catch(e){
      const msg=/abort/i.test(e.message||"")?"tempo esgotado"
        :/Failed to fetch|NetworkError|Load failed/i.test(e.message||"")?"bloqueado"
        :(e.message||"falhou");
      c.textContent="falhou"; c.className="chip short";
      $(".row-s",n).textContent=msg; n.classList.add("sev","no");
    }
  }));
  const nota=$("#cx-nota");
  if(nota)nota.textContent = ok===0
    ? "Nenhum provedor respondeu. Sirva por HTTP (comando abaixo) ou verifique a rede. Num artefato publicado, a política de segurança bloqueia rede externa por definição."
    : ok===linhas.length ? "Todos responderam. Cripto vem da Binance, com Coinbase e Kraken de reserva; câmbio diário do BCE."
    : `${linhas.length-ok} fora. O painel usa quem respondeu e cai na série sintética no resto.`;
  buzz(10);
  return ok;
}

  $("#live").onclick=()=>{go(VIEWS.findIndex(v=>v.id==="dados"));setTimeout(testarConexoes,320);};
  $("#dot").onclick=$("#live").onclick;
})();

/* teclado físico ajuda no teste em navegador de mesa */
addEventListener("keydown",e=>{
  if(e.key==="Escape"&&sheetOpen)closeSheet();
  if(e.key==="ArrowRight")go(M.vi+1);
  if(e.key==="ArrowLeft")go(M.vi-1);
});
</script>
