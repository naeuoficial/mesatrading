<title>MESA · móvel</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0F1319">

<style>
/* ═══════════════════════════════════════════════════════════════
   MESA MÓVEL — mesmo painel de instrumentos, gramática de toque.
   Regra de ouro: tudo que se opera fica ao alcance do polegar.
   ═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#0F1319; --panel:#171C24; --panel-2:#1D232C; --sunk:#0B0E13;
  --rule:#28303B; --rule-soft:#1F2630;
  --brass:#D4A03C; --brass-soft:#3A2E14; --brass-ink:#0F1319;
  --long:#3FA37A; --short:#D1544B; --warn:#C98A2E; --info:#5B8DB8;
  --fg:#E6E3DC; --fg-2:#9AA2AD; --fg-3:#666E7A;
  --grid:#1B222B;

  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;

  --r:3px;
  --top:52px;
  --modes:38px;
  --tabs:58px;
  --safe:env(safe-area-inset-bottom,0px);
  --tap:44px;
}
@media (prefers-color-scheme: light){
  :root{
    --bg:#E4E1DA; --panel:#F1EFE9; --panel-2:#E7E4DC; --sunk:#D8D4CA;
    --rule:#C9C4B8; --rule-soft:#D6D2C7;
    --brass:#8A6011; --brass-soft:#EFE3C6; --brass-ink:#FFFDF7;
    --long:#1D7A54; --short:#A8382F; --warn:#8A5F12; --info:#3D6C93;
    --fg:#15181E; --fg-2:#565C66; --fg-3:#848A93; --grid:#D9D5CA;
  }
}
:root[data-theme="light"]{
  --bg:#E4E1DA; --panel:#F1EFE9; --panel-2:#E7E4DC; --sunk:#D8D4CA;
  --rule:#C9C4B8; --rule-soft:#D6D2C7;
  --brass:#8A6011; --brass-soft:#EFE3C6; --brass-ink:#FFFDF7;
  --long:#1D7A54; --short:#A8382F; --warn:#8A5F12; --info:#3D6C93;
  --fg:#15181E; --fg-2:#565C66; --fg-3:#848A93; --grid:#D9D5CA;
}
:root[data-theme="dark"]{
  --bg:#0F1319; --panel:#171C24; --panel-2:#1D232C; --sunk:#0B0E13;
  --rule:#28303B; --rule-soft:#1F2630;
  --brass:#D4A03C; --brass-soft:#3A2E14; --brass-ink:#0F1319;
  --long:#3FA37A; --short:#D1544B; --warn:#C98A2E; --info:#5B8DB8;
  --fg:#E6E3DC; --fg-2:#9AA2AD; --fg-3:#666E7A; --grid:#1B222B;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  margin:0;background:var(--bg);color:var(--fg);
  font-family:var(--sans);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  user-select:none;
}
button,input,select,textarea{font:inherit;color:inherit}
input,textarea{user-select:text}
:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

.app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* ── barra superior: informação, nunca ação primária ────────── */
.top{
  height:var(--top);flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:0 14px;background:var(--panel);border-bottom:1px solid var(--rule);
  padding-top:env(safe-area-inset-top,0px);height:calc(var(--top) + env(safe-area-inset-top,0px));
}
.mark{font-family:var(--serif);font-size:17px;line-height:1}
.mark span{color:var(--brass)}
.top-t{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin-top:2px}
.top-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--fg-2);padding:6px 4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--long);animation:bl 2.4s ease-in-out infinite}
.dot.sim{background:var(--warn)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.28}}
.ico{
  width:var(--tap);height:36px;display:grid;place-items:center;background:none;border:0;
  border-radius:var(--r);color:var(--fg-2);font-family:var(--mono);font-size:15px;cursor:pointer;
}
.ico:active{background:var(--panel-2)}

/* ── palco deslizante ───────────────────────────────────────── */
.stage{flex:1;position:relative;overflow:hidden}
.track{display:flex;height:100%;will-change:transform}
.view{
  width:100vw;flex-shrink:0;height:100%;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
  padding:10px 10px 22px;touch-action:pan-y;
}
.view::-webkit-scrollbar{display:none}

/* ── puxar para atualizar ───────────────────────────────────── */
.ptr{
  position:absolute;top:0;left:0;right:0;height:52px;display:grid;place-items:center;
  pointer-events:none;opacity:0;z-index:5;
}
.ptr-r{width:20px;height:20px;border:2px solid var(--rule);border-top-color:var(--brass);border-radius:50%}
.ptr.go .ptr-r{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── blocos ─────────────────────────────────────────────────── */
.blocks{display:flex;flex-direction:column;gap:9px}
.blk{background:var(--panel);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.blk-h{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--rule)}
.blk-e{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-3)}
.blk-t{font-family:var(--serif);font-size:14px;margin-left:auto;color:var(--fg-2)}
.blk-b{padding:12px}
.blk-b.flush{padding:0}

/* modo ajustar */
.blk.edit{border-color:var(--brass);border-style:dashed}
.grip{
  display:none;width:34px;height:34px;margin:-8px -6px -8px -4px;
  place-items:center;color:var(--brass);font-size:15px;touch-action:none;cursor:grab;
}
body[data-mode="ajustar"] .grip{display:grid}
.blk-x{display:none;margin-left:8px;width:34px;height:34px;place-items:center;
  background:none;border:0;color:var(--fg-3);font-size:16px;cursor:pointer}
body[data-mode="ajustar"] .blk-x{display:grid}
.blk.lift{
  position:relative;z-index:30;box-shadow:0 16px 34px rgba(0,0,0,.45);
  border-color:var(--brass);border-style:solid;
}
.blk.ghost{opacity:.32}
.blk.off{display:none}
body[data-mode="ajustar"] .blk.off{display:block;opacity:.4;border-style:dotted}
body[data-mode="ajustar"] .blk.off .blk-b{display:none}

/* ── métricas ───────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule-soft)}
.st{background:var(--panel);padding:11px 12px;display:flex;flex-direction:column;gap:2px}
.st-l{font-family:var(--mono);font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--fg-3)}
.st-v{font-family:var(--mono);font-size:19px;font-variant-numeric:tabular-nums;line-height:1.15}
.st-d{font-family:var(--mono);font-size:9.5px;color:var(--fg-3);line-height:1.35}

.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.up{color:var(--long)} .dn{color:var(--short)} .fl{color:var(--fg-2)}

.chip{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.07em;
  text-transform:uppercase;padding:3px 6px;border-radius:2px;border:1px solid var(--rule);
  color:var(--fg-2);white-space:nowrap}
.chip.brass{border-color:var(--brass);color:var(--brass);background:var(--brass-soft)}
.chip.long{border-color:var(--long);color:var(--long)}
.chip.short{border-color:var(--short);color:var(--short)}
.chip.warn{border-color:var(--warn);color:var(--warn)}
.chip.mute{color:var(--fg-3)}

.sev{border-left:2px solid var(--rule)}
.sev.ok{border-left-color:var(--long)}
.sev.no{border-left-color:var(--short)}
.sev.hold{border-left-color:var(--warn)}

/* ── listas ─────────────────────────────────────────────────── */
.rows{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--rule-soft);min-height:var(--tap)}
.row:last-child{border-bottom:0}
.row:active{background:var(--panel-2)}
.row-m{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.row-t{font-size:13px;line-height:1.4}
.row-s{font-family:var(--mono);font-size:10px;color:var(--fg-3);line-height:1.4}
.row-v{font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.row-a{color:var(--fg-3);font-family:var(--mono);font-size:13px}

/* ── gráfico ────────────────────────────────────────────────── */
.chart{position:relative;background:var(--panel)}
.chart-h{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--rule-soft)}
.chart-s{font-family:var(--serif);font-size:14px}
.chart-p{margin-left:auto;font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums}
.chart-c{font-family:var(--mono);font-size:11px;font-variant-numeric:tabular-nums}
canvas{display:block;width:100%;touch-action:pan-y}
body[data-mode="analisar"] canvas,body[data-mode="ajustar"] canvas{touch-action:none}
.scrub{
  display:none;padding:8px 12px;background:var(--sunk);border-top:1px solid var(--rule-soft);
  font-family:var(--mono);font-size:10.5px;line-height:1.65;
}
.scrub.on{display:block}
.scrub-g{display:grid;grid-template-columns:repeat(3,1fr);gap:2px 10px}
.scrub-k{color:var(--fg-3)}

/* ── formulários ────────────────────────────────────────────── */
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.f:last-child{margin-bottom:0}
.f-l{font-family:var(--mono);font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--fg-3)}
.f-h{font-family:var(--mono);font-size:9.5px;color:var(--fg-3);line-height:1.45}
input[type=text],input[type=number],input[type=time],input[type=date],select,textarea{
  background:var(--sunk);border:1px solid var(--rule);border-radius:2px;
  padding:11px 10px;font-family:var(--mono);font-size:16px;width:100%;
}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--fg-3) 50%),
  linear-gradient(135deg,var(--fg-3) 50%,transparent 50%);
  background-position:calc(100% - 16px) 50%,calc(100% - 11px) 50%;
  background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:32px}
input[type=range]{width:100%;accent-color:var(--brass);height:var(--tap)}
textarea{resize:none;line-height:1.5}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.days{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.day{
  min-height:var(--tap);display:grid;place-items:center;background:var(--sunk);
  border:1px solid var(--rule);border-radius:2px;font-family:var(--mono);font-size:11px;color:var(--fg-3);
}
.day.on{background:var(--brass-soft);border-color:var(--brass);color:var(--brass)}

.btn{
  min-height:var(--tap);padding:0 16px;background:var(--panel-2);border:1px solid var(--rule);
  border-radius:2px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--fg-2);cursor:pointer;
}
.btn:active{background:var(--rule)}
.btn.pri{background:var(--brass);border-color:var(--brass);color:var(--brass-ink);font-weight:600}
.btn.wide{width:100%}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btns .btn{flex:1;min-width:104px}

.sw{width:44px;height:26px;background:var(--sunk);border:1px solid var(--rule);
  border-radius:13px;position:relative;flex-shrink:0;transition:.18s}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;
  border-radius:50%;background:var(--fg-3);transition:.18s}
.sw.on{background:var(--brass-soft);border-color:var(--brass)}
.sw.on::after{left:23px;background:var(--brass)}

.code{
  background:var(--sunk);border:1px solid var(--rule);border-radius:2px;padding:11px;
  overflow:auto;max-height:320px;font-family:var(--mono);font-size:10px;line-height:1.6;
  white-space:pre;user-select:text;-webkit-overflow-scrolling:touch;
}
.code .kw{color:var(--brass)} .code .cm{color:var(--fg-3);font-style:italic}
.code .st{color:var(--long)} .code .nm{color:var(--info)}

.gauge{height:30px;position:relative;background:var(--sunk);border:1px solid var(--rule);
  border-radius:2px;overflow:hidden;margin-bottom:8px}
.gauge-f{position:absolute;top:0;bottom:0;transition:all .4s cubic-bezier(.4,0,.2,1)}
.gauge-m{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--rule)}
.gauge-t{position:absolute;top:0;bottom:0;width:1px;background:var(--brass);opacity:.55}

.note{font-family:var(--mono);font-size:10px;color:var(--fg-3);line-height:1.6}
.empty{padding:26px 14px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--fg-3)}

/* ── seletor de modo ────────────────────────────────────────── */
.modes{
  height:var(--modes);flex-shrink:0;display:flex;gap:0;padding:0 10px;align-items:center;
  background:var(--panel);border-top:1px solid var(--rule);
}
.modes-in{display:flex;flex:1;background:var(--sunk);border:1px solid var(--rule);border-radius:3px;padding:2px;gap:2px}
.mode{
  flex:1;height:26px;display:grid;place-items:center;background:none;border:0;border-radius:2px;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--fg-3);cursor:pointer;
}
.mode.on{background:var(--brass-soft);color:var(--brass)}
.mode-h{font-family:var(--mono);font-size:9px;color:var(--fg-3);padding-left:10px;white-space:nowrap}

/* ── barra de abas ──────────────────────────────────────────── */
.tabbar{
  flex-shrink:0;display:flex;background:var(--panel);border-top:1px solid var(--rule);
  padding-bottom:var(--safe);height:calc(var(--tabs) + var(--safe));
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:0;color:var(--fg-3);cursor:pointer;position:relative;
}
.tab-i{font-size:17px;line-height:1;font-family:var(--mono)}
.tab-l{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase}
.tab.on{color:var(--brass)}
.tab.on::before{content:"";position:absolute;top:0;left:22%;right:22%;height:2px;background:var(--brass)}

/* pontos de página */
.dots{display:flex;justify-content:center;gap:4px;padding:5px 0 0}
.dots i{width:4px;height:4px;border-radius:50%;background:var(--rule);transition:.2s}
.dots i.on{background:var(--brass);width:12px;border-radius:2px}

/* ── folha inferior ─────────────────────────────────────────── */
.sheet-bd{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;opacity:0;
  pointer-events:none;transition:opacity .22s;
}
.sheet-bd.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:90;background:var(--panel);
  border-top:1px solid var(--rule);border-radius:12px 12px 0 0;
  transform:translateY(101%);transition:transform .26s cubic-bezier(.32,.72,0,1);
  max-height:86vh;display:flex;flex-direction:column;
  padding-bottom:var(--safe);will-change:transform;
}
.sheet.on{transform:none}
.sheet-g{padding:9px 0 5px;display:grid;place-items:center;touch-action:none;flex-shrink:0}
.sheet-g i{width:34px;height:4px;border-radius:2px;background:var(--rule)}
.sheet-h{display:flex;align-items:center;gap:9px;padding:2px 14px 10px;border-bottom:1px solid var(--rule);flex-shrink:0}
.sheet-t{font-family:var(--serif);font-size:16px}
.sheet-e{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-3)}
.sheet-b{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:10px}
.mi{display:flex;align-items:center;gap:11px;padding:0 14px;min-height:50px;border-bottom:1px solid var(--rule-soft)}
.mi:last-child{border-bottom:0}
.mi:active{background:var(--panel-2)}
.mi-i{width:22px;text-align:center;color:var(--brass);font-family:var(--mono);font-size:14px;flex-shrink:0}
.mi-t{flex:1;font-size:13.5px}
.mi-s{font-family:var(--mono);font-size:9.5px;color:var(--fg-3)}
.mi-c{color:var(--brass);font-size:14px}

/* ── aviso flutuante ────────────────────────────────────────── */
.toast{position:fixed;left:10px;right:10px;z-index:100;display:flex;flex-direction:column;gap:7px;
  bottom:calc(var(--tabs) + var(--modes) + var(--safe) + 10px);pointer-events:none}
.tst{
  background:var(--panel);border:1px solid var(--brass);border-left-width:3px;border-radius:var(--r);
  padding:10px 12px;box-shadow:0 10px 28px rgba(0,0,0,.4);animation:up .26s cubic-bezier(.32,.72,0,1);
}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.tst-t{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--brass);margin-bottom:3px}
.tst-m{font-size:12.5px;line-height:1.45}

.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--rule);font-size:8.5px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:400;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--rule-soft);font-variant-numeric:tabular-nums;white-space:nowrap}
.ta-r{text-align:right}
</style>

<div class="app">
  <header class="top">
    <div>
      <div class="mark">MESA <span>◆</span></div>
      <div class="top-t" id="top-sub">painel</div>
    </div>
    <div class="top-r">
      <span class="live"><i class="dot" id="dot"></i><span id="live">—</span></span>
      <button class="ico" id="btn-theme" aria-label="Alternar tema">◐</button>
    </div>
  </header>

  <div class="stage" id="stage">
    <div class="ptr" id="ptr"><div class="ptr-r"></div></div>
    <div class="track" id="track"></div>
  </div>

  <div class="modes">
    <div class="modes-in" id="modes">
      <button class="mode on" data-m="navegar">Navegar</button>
      <button class="mode" data-m="analisar">Analisar</button>
      <button class="mode" data-m="ajustar">Ajustar</button>
    </div>
    <span class="mode-h" id="mode-h">deslize p/ trocar</span>
  </div>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<div class="sheet-bd" id="sheetbd"></div>
<div class="sheet" id="sheet">
  <div class="sheet-g" id="sheetg"><i></i></div>
  <div class="sheet-h"><span class="sheet-e" id="sheet-e">—</span><span class="sheet-t" id="sheet-t">—</span></div>
  <div class="sheet-b" id="sheet-b"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════ MOTOR COMPARTILHADO ═══════════════
   Extraído de index.html sem alteração: indicadores, provedores
   públicos, filtros temporais, geradores MQL5/MQL4, dados das
   mesas e o renderizador de velas em canvas. A camada de
   interface abaixo é inteiramente própria do móvel.        */
"use strict";
const $=(s,r)=>(r||document).querySelector(s);
const $$=(s,r)=>[...(r||document).querySelectorAll(s)];
const el=(t,c,x)=>{const n=document.createElement(t);if(c)n.className=c;if(x!=null)n.textContent=x;return n;};
const tok=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const nf=(v,d=2)=>v==null||!isFinite(v)?"—":v.toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d});

const money=(v,d=2)=>(v<0?"−":"")+"$"+nf(Math.abs(v),d);

const pct=(v,d=2)=>(v>0?"+":v<0?"−":"")+nf(Math.abs(v),d)+"%";

const signCls=v=>v>0?"up":v<0?"dn":"fl";

const price=v=>v>=1000?nf(v,2):v>=1?nf(v,4):nf(v,6);

const pad2=n=>String(n).padStart(2,"0");

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const TF_MS={"15m":9e5,"1h":36e5,"4h":144e5,"1d":864e5};

const SEED_PX={BTCUSDT:64560,ETHUSDT:1867,SOLUSDT:75.9,BNBUSDT:568.7,XRPUSDT:1.095,ADAUSDT:0.1654,
               EURUSD:1.1435,GBPUSD:1.3438,USDJPY:162.35,XAUUSD:3320,US100:20840,US500:5972};

function seeded(seed){let a=seed>>>0;return()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

const hash=s=>{let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;};

function synth(sym,tf,n){
  const r=seeded(hash(sym+tf)), step=TF_MS[tf]||36e5;
  const p0=SEED_PX[sym]||100, vol=(sym.endsWith("USDT")?0.011:sym==="XAUUSD"?0.005:0.0028)*Math.sqrt(step/36e5);
  const t0=Math.floor(Date.now()/step)*step-(n-1)*step;
  const out=[]; let p=p0*(0.82+r()*0.3);
  for(let i=0;i<n;i++){
    const t=t0+i*step;
    const cyc=Math.sin(i/17)*0.4+Math.sin(i/53)*0.6;
    const drift=(r()-0.5)*2*vol+cyc*vol*0.35;
    const o=p, c=p*(1+drift);
    const wick=vol*(0.4+r()*1.1);
    const h=Math.max(o,c)*(1+wick*r()), l=Math.min(o,c)*(1-wick*r());
    out.push({t,o,h,l,c,v:(0.5+r())*1e6});
    p=c;
  }
  return out;
}

async function getJSON(url,ms=6000){
  const ctl=new AbortController(), to=setTimeout(()=>ctl.abort(),ms);
  try{
    const rs=await fetch(url,{signal:ctl.signal});
    if(!rs.ok)throw new Error("HTTP "+rs.status);
    return await rs.json();
  } finally { clearTimeout(to); }
}

const Feed={
  live:false, cache:new Map(), origem:new Map(),
  async candles(sym,tf,n=180){
    const key=sym+tf;
    if(this.cache.has(key))return this.cache.get(key);
    let data=null, src="demo";

    /* 1. cripto → Binance, com Coinbase e Kraken de reserva.
       A ordem importa: Binance cobre todos os timeframes; Coinbase
       só aceita 60/300/900/3600/21600/86400 s (não tem 4h); Kraken
       aceita 240 min e cobre justamente esse buraco. */
    if(isCrypto(sym)){
      const hosts=["https://api.binance.com","https://data-api.binance.vision"];
      for(const h of hosts){
        try{
          const j=await getJSON(`${h}/api/v3/klines?symbol=${sym}&interval=${tf}&limit=${n}`,5000);
          data=j.map(k=>({t:k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));
          src="binance"; this.live=true; break;
        }catch(_){/* 451 por geolocalização cai no espelho */}
      }
      const CB={"15m":900,"1h":3600,"1d":86400};   /* 4h não existe aqui */
      if(!data && CB[tf]){
        try{
          const par=sym.replace("USDT","")+"-USD";
          const j=await getJSON(`https://api.exchange.coinbase.com/products/${par}/candles?granularity=${CB[tf]}`,5000);
          /* [tempo, mín, máx, abertura, fechamento, volume] — mín e máx
             vêm ANTES de abertura, ordem diferente de todo mundo — e
             a lista chega do mais recente para o mais antigo. */
          data=j.slice(0,n).reverse()
                .map(k=>({t:k[0]*1000,o:+k[3],h:+k[2],l:+k[1],c:+k[4],v:+k[5]}));
          src="coinbase"; this.live=true;
        }catch(_){/* segue */}
      }
      const KR={"15m":15,"1h":60,"4h":240,"1d":1440};
      if(!data && KR[tf]){
        try{
          const par=(sym.replace("USDT","")==="BTC"?"XBT":sym.replace("USDT",""))+"USD";
          const j=await getJSON(`https://api.kraken.com/0/public/OHLC?pair=${par}&interval=${KR[tf]}`,5000);
          if(j.error&&j.error.length)throw new Error(j.error[0]);
          /* a chave do resultado vem remapeada (XBTUSD → XXBTZUSD) */
          const arr=Object.values(j.result).find(Array.isArray)||[];
          data=arr.slice(-n).map(k=>({t:k[0]*1000,o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[6]}));
          if(data.length>30){src="kraken"; this.live=true;} else data=null;
        }catch(_){/* segue para a síntese */}
      }
    }

    /* 2. câmbio diário → Frankfurter (BCE). Só existe taxa de
       referência diária: a vela é montada com abertura = fechamento
       anterior. É preço real, mas não é OHLC intradiário. */
    if(!data && tf==="1d" && FX_PAIRS[sym]){
      try{
        const [b,q]=FX_PAIRS[sym];
        const fim=new Date(), ini=new Date(fim.getTime()-n*1.6*864e5);
        const d=x=>x.toISOString().slice(0,10);
        const j=await getJSON(`https://api.frankfurter.dev/v1/${d(ini)}..${d(fim)}?base=${b}&symbols=${q}`,6000);
        const dias=Object.keys(j.rates).sort();
        data=dias.map((dia,i)=>{
          const c=j.rates[dia][q];
          const o=i? j.rates[dias[i-1]][q] : c;
          return{t:new Date(dia+"T00:00:00Z").getTime(),o,
                 h:Math.max(o,c),l:Math.min(o,c),c,v:0};
        }).slice(-n);
        if(data.length>30){src="frankfurter"; this.live=true;} else data=null;
      }catch(_){data=null;}
    }

    if(!data){data=synth(sym,tf,n); src="demo";}
    this.cache.set(key,data);
    this.origem.set(key,src);
    return data;
  },
  src(sym,tf){return this.origem.get(sym+tf)||"demo";},
  clear(){this.cache.clear(); this.origem.clear(); this.live=false;}
};

const TA={
  ema(v,p){const k=2/(p+1),o=[];let e=v[0];for(let i=0;i<v.length;i++){e=i?v[i]*k+e*(1-k):v[0];o.push(e);}return o;},
  sma(v,p){const o=[];let s=0;for(let i=0;i<v.length;i++){s+=v[i];if(i>=p)s-=v[i-p];o.push(i>=p-1?s/p:NaN);}return o;},
  rsi(v,p=14){
    const o=Array(v.length).fill(NaN);let g=0,l=0;
    for(let i=1;i<=p;i++){const d=v[i]-v[i-1];d>=0?g+=d:l-=d;}
    g/=p;l/=p;o[p]=l===0?100:100-100/(1+g/l);
    for(let i=p+1;i<v.length;i++){
      const d=v[i]-v[i-1];
      g=(g*(p-1)+(d>0?d:0))/p; l=(l*(p-1)+(d<0?-d:0))/p;
      o[i]=l===0?100:100-100/(1+g/l);
    }
    return o;
  },
  macd(v,f=12,s=26,g=9){
    const ef=this.ema(v,f),es=this.ema(v,s);
    const line=v.map((_,i)=>ef[i]-es[i]);
    const sig=this.ema(line,g);
    return{line,sig,hist:line.map((x,i)=>x-sig[i])};
  },
  atr(c,p=14){
    const tr=c.map((k,i)=>i?Math.max(k.h-k.l,Math.abs(k.h-c[i-1].c),Math.abs(k.l-c[i-1].c)):k.h-k.l);
    const o=Array(c.length).fill(NaN);let a=tr.slice(0,p).reduce((x,y)=>x+y,0)/p;o[p-1]=a;
    for(let i=p;i<c.length;i++){a=(a*(p-1)+tr[i])/p;o[i]=a;}
    return o;
  },
  bb(v,p=20,m=2){
    const mid=this.sma(v,p),up=[],lo=[];
    for(let i=0;i<v.length;i++){
      if(i<p-1){up.push(NaN);lo.push(NaN);continue;}
      let s=0;for(let j=i-p+1;j<=i;j++)s+=(v[j]-mid[i])**2;
      const sd=Math.sqrt(s/p); up.push(mid[i]+m*sd); lo.push(mid[i]-m*sd);
    }
    return{mid,up,lo};
  },
  adx(c,p=14){
    const n=c.length,pdm=[0],ndm=[0],tr=[0];
    for(let i=1;i<n;i++){
      const u=c[i].h-c[i-1].h, d=c[i-1].l-c[i].l;
      pdm.push(u>d&&u>0?u:0); ndm.push(d>u&&d>0?d:0);
      tr.push(Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c)));
    }
    const sm=a=>{const o=Array(n).fill(NaN);let s=a.slice(1,p+1).reduce((x,y)=>x+y,0);o[p]=s;
      for(let i=p+1;i<n;i++){s=s-s/p+a[i];o[i]=s;}return o;};
    const st=sm(tr),sp=sm(pdm),sn=sm(ndm);
    const pdi=[],ndi=[],dx=[];
    for(let i=0;i<n;i++){
      const a=100*sp[i]/st[i], b=100*sn[i]/st[i];
      pdi.push(a); ndi.push(b);
      dx.push(isFinite(a+b)&&a+b!==0?100*Math.abs(a-b)/(a+b):NaN);
    }
    const adx=Array(n).fill(NaN);
    const st1=2*p;
    if(n>st1){
      let s=0,cnt=0;
      for(let i=p+1;i<=st1;i++){if(isFinite(dx[i])){s+=dx[i];cnt++;}}
      adx[st1]=cnt?s/cnt:NaN;
      for(let i=st1+1;i<n;i++)adx[i]=(adx[i-1]*(p-1)+dx[i])/p;
    }
    return{adx,pdi,ndi};
  }
};

/* cache das séries completas, limpo a cada atualização */
const SERIES=new Map();

function seriesFor(key,c){
  if(SERIES.has(key))return SERIES.get(key);
  const cl=c.map(k=>k.c);
  const s={
    ema9:TA.ema(cl,9), ema21:TA.ema(cl,21), ema50:TA.ema(cl,50),
    rsi:TA.rsi(cl,14), macd:TA.macd(cl), atr:TA.atr(c,14),
    bb:TA.bb(cl,20,2), adx:TA.adx(c,14)
  };
  SERIES.set(key,s); return s;
}

function snapshotAt(c,s,i){
  if(i<1)i=1;
  const px=c[i].c, bbUp=s.bb.up[i], bbLo=s.bb.lo[i];
  return{
    px, prev:c[i-1].c, chg:(px/c[i-1].c-1)*100,
    ema9:s.ema9[i], ema21:s.ema21[i], ema50:s.ema50[i],
    emaPrev:{f:s.ema9[i-1],s:s.ema21[i-1]},
    rsi:s.rsi[i], rsiPrev:s.rsi[i-1],
    macd:s.macd.line[i], macdSig:s.macd.sig[i],
    macdHist:s.macd.hist[i], macdHistPrev:s.macd.hist[i-1],
    atr:s.atr[i], atrPct:s.atr[i]/px*100,
    bbUp, bbLo, bbMid:s.bb.mid[i],
    bbPos:(px-bbLo)/((bbUp-bbLo)||1)*100,
    bbWidth:(bbUp-bbLo)/s.bb.mid[i]*100,
    adx:s.adx.adx[i], pdi:s.adx.pdi[i], ndi:s.adx.ndi[i],
    candle:c[i], idx:i
  };
}

function readIndicators(c){
  const cl=c.map(k=>k.c), i=cl.length-1;
  const e9=TA.ema(cl,9), e21=TA.ema(cl,21), e50=TA.ema(cl,50);
  const rsi=TA.rsi(cl,14), mac=TA.macd(cl), atr=TA.atr(c,14), bb=TA.bb(cl,20,2), ax=TA.adx(c,14);
  const px=cl[i];
  return{
    px, prev:cl[i-1],
    chg:(px/cl[i-1]-1)*100,
    ema9:e9[i], ema21:e21[i], ema50:e50[i],
    emaPrev:{f:e9[i-1],s:e21[i-1]},
    rsi:rsi[i], rsiPrev:rsi[i-1],
    macd:mac.line[i], macdSig:mac.sig[i], macdHist:mac.hist[i], macdHistPrev:mac.hist[i-1],
    atr:atr[i], atrPct:atr[i]/px*100,
    bbUp:bb.up[i], bbLo:bb.lo[i], bbMid:bb.mid[i],
    bbPos:(px-bb.lo[i])/((bb.up[i]-bb.lo[i])||1)*100,
    bbWidth:(bb.up[i]-bb.lo[i])/bb.mid[i]*100,
    adx:ax.adx[i], pdi:ax.pdi[i], ndi:ax.ndi[i]
  };
}

function computeScore(s,w){
  const parts=[];
  /* Velas anteriores ao aquecimento dos indicadores devolvem NaN.
     Elas existem no gráfico — dá para passar o mouse nelas — então
     a contribuição é descartada em vez de contaminar o score. */
  const add=(k,name,v,note)=>{
    if(!(w[k]>0))return;
    if(!isFinite(v)){parts.push({k,name,v:0,w:0,note:"aquecendo — sem leitura ainda"});return;}
    parts.push({k,name,v:clamp(v,-1,1),w:w[k],note});
  };

  const spread=(s.ema9-s.ema21)/s.px*100;
  add("ema","Cruzamento EMA", clamp(spread*22,-1,1),
      `EMA9 ${spread>0?"acima":"abaixo"} da EMA21 · ${nf(spread,3)}%`);

  add("rsi","RSI (14)", s.rsi>50?(s.rsi-50)/28:-(50-s.rsi)/28,
      s.rsi>70?"sobrecomprado":s.rsi<30?"sobrevendido":"faixa neutra");

  const hn=s.macdHist/(s.atr||1);
  add("macd","MACD", clamp(hn*3.2,-1,1),
      `histograma ${s.macdHist>s.macdHistPrev?"expandindo":"contraindo"}`);

  add("bb","Bollinger", -(s.bbPos-50)/44,
      s.bbPos>80?"colado na banda superior":s.bbPos<20?"colado na inferior":"dentro do canal");

  const trend=(s.pdi-s.ndi)/40, force=clamp((s.adx-18)/28,0,1);
  add("adx","ADX / DI", clamp(trend,-1,1)*force,
      s.adx>25?`tendência firme (${nf(s.adx,1)})`:`sem tendência (${nf(s.adx,1)})`);

  const calm=clamp(1-(s.atrPct-0.55)/1.6,-1,1);
  add("atr","Volatilidade", calm*Math.sign(spread||1)*0.75,
      `ATR ${nf(s.atrPct,2)}% ${s.atrPct>2?"— alta demais":s.atrPct<0.3?"— apática":"— operável"}`);

  const tw=parts.reduce((a,p)=>a+p.w,0);
  const score=tw>0?parts.reduce((a,p)=>a+p.v*p.w,0)/tw*100:0;
  const warmup=parts.some(p=>p.w===0);
  return{score,parts,warmup};
}

const SUBS={
  none:{n:"Nenhum"}, rsi:{n:"RSI 14"}, macd:{n:"MACD"},
  atr:{n:"ATR 14"}, adx:{n:"ADX 14"}, vol:{n:"Volume"}
};

function drawChart(cv,candles,sym,hover){
  const dpr=devicePixelRatio||1, W=cv.clientWidth, H=cv.clientHeight;
  if(!W||!H)return;
  cv.width=W*dpr; cv.height=H*dpr;
  const g=cv.getContext("2d"); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,W,H);

  const o=cv._opts||(cv._opts={ema:true,bb:false,ema50:false,sub:"none"});
  const N=cv._bars||90;
  const start=Math.max(0,candles.length-N);
  const view=candles.slice(start);
  const key=sym+S.tf, ser=seriesFor(key,candles);

  const subOn=o.sub!=="none";
  const padL=6,padR=62,padT=10,padB=16;
  const subH=subOn?46:0, subGap=subOn?7:0;
  const iw=W-padL-padR, ih=H-padT-padB-subH-subGap;
  if(ih<20)return;

  let hi=-Infinity,lo=Infinity;
  view.forEach(k=>{hi=Math.max(hi,k.h);lo=Math.min(lo,k.l);});
  if(o.bb)for(let i=start;i<candles.length;i++){
    if(isFinite(ser.bb.up[i]))hi=Math.max(hi,ser.bb.up[i]);
    if(isFinite(ser.bb.lo[i]))lo=Math.min(lo,ser.bb.lo[i]);
  }
  const rng=(hi-lo)||1; hi+=rng*0.06; lo-=rng*0.06;
  const y=v=>padT+ih-(v-lo)/(hi-lo)*ih;
  const cw=iw/view.length;
  const xAt=i=>padL+i*cw+cw/2;

  cv._geo={padL,padR,padT,padB,iw,ih,cw,lo,hi,start,n:view.length,subOn,subH,subGap,W,H};

  const up=tok("--long"), dn=tok("--short"), brass=tok("--brass"), info=tok("--info");
  const mono="9px ui-monospace,monospace";

  /* grade horizontal + escala de preço */
  g.strokeStyle=tok("--grid"); g.lineWidth=1; g.font=mono;
  g.fillStyle=tok("--fg-3"); g.textBaseline="middle";
  for(let i=0;i<=4;i++){
    const v=lo+(hi-lo)*i/4, py=Math.round(y(v))+0.5;
    g.beginPath(); g.moveTo(padL,py); g.lineTo(padL+iw,py); g.stroke();
    g.fillText(price(v),padL+iw+6,py);
  }

  /* Bollinger por baixo de tudo */
  if(o.bb){
    g.beginPath();
    for(let i=0;i<view.length;i++){const v=ser.bb.up[start+i]; if(!isFinite(v))continue;
      const x=xAt(i); i?g.lineTo(x,y(v)):g.moveTo(x,y(v));}
    for(let i=view.length-1;i>=0;i--){const v=ser.bb.lo[start+i]; if(!isFinite(v))continue;
      g.lineTo(xAt(i),y(v));}
    g.closePath();
    g.fillStyle=`color-mix(in srgb, ${brass} 9%, transparent)`; g.fill();
    [[ser.bb.up,.55],[ser.bb.lo,.55],[ser.bb.mid,.35]].forEach(([s2,a])=>{
      g.beginPath(); g.strokeStyle=brass; g.globalAlpha=a; g.lineWidth=1;
      let m=false;
      for(let i=0;i<view.length;i++){const v=s2[start+i]; if(!isFinite(v))continue;
        const x=xAt(i); m?g.lineTo(x,y(v)):(g.moveTo(x,y(v)),m=true);}
      g.stroke(); g.globalAlpha=1;
    });
  }

  /* médias */
  if(o.ema)[[ser.ema9,info,1],[ser.ema21,brass,1.4]].forEach(([s2,col,lw])=>{
    g.beginPath(); g.strokeStyle=col; g.lineWidth=lw;
    for(let i=0;i<view.length;i++){const x=xAt(i); i?g.lineTo(x,y(s2[start+i])):g.moveTo(x,y(s2[start+i]));}
    g.stroke();
  });
  if(o.ema50){
    g.beginPath(); g.strokeStyle=tok("--fg-3"); g.lineWidth=1; g.setLineDash([4,3]);
    for(let i=0;i<view.length;i++){const x=xAt(i); i?g.lineTo(x,y(ser.ema50[start+i])):g.moveTo(x,y(ser.ema50[start+i]));}
    g.stroke(); g.setLineDash([]);
  }

  /* velas */
  view.forEach((k,i)=>{
    const x=xAt(i), bull=k.c>=k.o, col=bull?up:dn;
    g.strokeStyle=col; g.fillStyle=col; g.lineWidth=1;
    g.beginPath(); g.moveTo(x,y(k.h)); g.lineTo(x,y(k.l)); g.stroke();
    const bw=Math.max(1.2,cw*0.62), yo=y(k.o), yc=y(k.c);
    g.fillRect(x-bw/2,Math.min(yo,yc),bw,Math.max(1,Math.abs(yc-yo)));
  });

  /* subpainel */
  if(subOn){
    const sy=padT+ih+subGap, sh=subH;
    g.strokeStyle=tok("--rule-soft"); g.lineWidth=1;
    g.beginPath(); g.moveTo(padL,sy+0.5); g.lineTo(padL+iw,sy+0.5); g.stroke();
    g.fillStyle=tok("--fg-3"); g.font=mono; g.textBaseline="top";
    g.fillText(SUBS[o.sub].n,padL+2,sy+3);

    const paint=(vals,min,max,col,zero)=>{
      const yy=v=>sy+sh-(clamp(v,min,max)-min)/((max-min)||1)*sh;
      if(zero!=null){
        g.strokeStyle=tok("--grid"); g.setLineDash([2,3]);
        g.beginPath(); g.moveTo(padL,yy(zero)+0.5); g.lineTo(padL+iw,yy(zero)+0.5); g.stroke();
        g.setLineDash([]);
      }
      g.beginPath(); g.strokeStyle=col; g.lineWidth=1.2; let m=false;
      for(let i=0;i<view.length;i++){
        const v=vals[start+i]; if(!isFinite(v))continue;
        const x=xAt(i); m?g.lineTo(x,yy(v)):(g.moveTo(x,yy(v)),m=true);
      }
      g.stroke();
      const lastV=vals[candles.length-1];
      if(isFinite(lastV)){
        g.fillStyle=col; g.textBaseline="middle";
        g.fillText(nf(lastV,o.sub==="atr"?4:1),padL+iw+6,yy(lastV));
      }
    };

    if(o.sub==="rsi"){
      [30,70].forEach(lv=>{
        const yy=sy+sh-(lv/100)*sh;
        g.strokeStyle=tok("--grid"); g.setLineDash([2,3]);
        g.beginPath(); g.moveTo(padL,yy+0.5); g.lineTo(padL+iw,yy+0.5); g.stroke(); g.setLineDash([]);
      });
      paint(ser.rsi,0,100,brass,null);
    }
    else if(o.sub==="macd"){
      const h=ser.macd.hist; let mx=0;
      for(let i=start;i<candles.length;i++)if(isFinite(h[i]))mx=Math.max(mx,Math.abs(h[i]));
      mx=mx||1;
      const yy=v=>sy+sh/2-(v/mx)*(sh/2-3);
      view.forEach((_,i)=>{
        const v=h[start+i]; if(!isFinite(v))return;
        g.fillStyle=v>=0?up:dn;
        const y0=yy(0), y1=yy(v);
        g.fillRect(xAt(i)-Math.max(1,cw*0.3),Math.min(y0,y1),Math.max(1.5,cw*0.6),Math.max(1,Math.abs(y1-y0)));
      });
      paint(ser.macd.line,-mx*1.6,mx*1.6,brass,0);
    }
    else if(o.sub==="atr"){
      let mn=Infinity,mx=-Infinity;
      for(let i=start;i<candles.length;i++){const v=ser.atr[i]; if(isFinite(v)){mn=Math.min(mn,v);mx=Math.max(mx,v);}}
      paint(ser.atr,mn,mx,info,null);
    }
    else if(o.sub==="adx"){
      paint(ser.adx.pdi,0,60,up,null);
      paint(ser.adx.ndi,0,60,dn,null);
      paint(ser.adx.adx,0,60,brass,25);
    }
    else if(o.sub==="vol"){
      let mx=0; view.forEach(k=>mx=Math.max(mx,k.v||0)); mx=mx||1;
      view.forEach((k,i)=>{
        const h2=(k.v||0)/mx*(sh-4);
        g.fillStyle=k.c>=k.o?up:dn; g.globalAlpha=.45;
        g.fillRect(xAt(i)-Math.max(1,cw*0.3),sy+sh-h2,Math.max(1.5,cw*0.6),h2);
        g.globalAlpha=1;
      });
    }
  }

  /* último preço */
  const last=view[view.length-1], ly=y(last.c), bull=last.c>=last.o;
  g.strokeStyle=bull?up:dn; g.setLineDash([3,3]); g.lineWidth=1;
  g.beginPath(); g.moveTo(padL,ly+0.5); g.lineTo(padL+iw,ly+0.5); g.stroke(); g.setLineDash([]);
  g.fillStyle=bull?up:dn; g.fillRect(padL+iw+2,ly-7,padR-4,14);
  g.fillStyle=tok("--brass-ink"); g.font=mono; g.textBaseline="middle";
  g.fillText(price(last.c),padL+iw+6,ly);

  /* mira do hover */
  if(hover!=null&&hover>=0&&hover<view.length){
    const k=view[hover], hx=Math.round(xAt(hover))+0.5;
    g.strokeStyle=tok("--fg-3"); g.globalAlpha=.75; g.setLineDash([2,3]); g.lineWidth=1;
    g.beginPath(); g.moveTo(hx,padT); g.lineTo(hx,padT+ih+(subOn?subGap+subH:0)); g.stroke();
    const hy=Math.round(y(k.c))+0.5;
    g.beginPath(); g.moveTo(padL,hy); g.lineTo(padL+iw,hy); g.stroke();
    g.setLineDash([]); g.globalAlpha=1;

    g.fillStyle=tok("--brass"); g.fillRect(padL+iw+2,hy-7,padR-4,14);
    g.fillStyle=tok("--brass-ink"); g.font=mono; g.textBaseline="middle";
    g.fillText(price(k.c),padL+iw+6,hy);

    g.fillStyle=tok("--brass"); g.beginPath();
    g.arc(hx,y(k.c),2.6,0,Math.PI*2); g.fill();
  }
}

function parseList(str,min,max){
  const s=(str||"").trim();
  if(!s)return null;                     /* null = sem restrição */
  const out=new Set();
  s.split(",").forEach(tok=>{
    const t=tok.trim(); if(!t)return;
    const m=t.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m){
      const a=clamp(+m[1],min,max), b=clamp(+m[2],min,max);
      for(let i=Math.min(a,b);i<=Math.max(a,b);i++)out.add(i);
    }else if(/^\d+$/.test(t)){
      const v=+t; if(v>=min&&v<=max)out.add(v);
    }
  });
  return out.size?out:null;
}

const parseBlackout=s=>new Set((s||"").split(",").map(x=>x.trim()).filter(x=>/^\d{4}\.\d{2}\.\d{2}$/.test(x)));

function evalFilters(date,f){
  const mins=date.getHours()*60+date.getMinutes();
  const a=f.h1*60+f.m1, b=f.h2*60+f.m2;
  const inWindow = a<=b ? (mins>=a&&mins<=b) : (mins>=a||mins<=b);
  const dom=parseList(f.dom,1,31), mon=parseList(f.mon,1,12);
  const bl=parseBlackout(f.black);
  const stamp=`${date.getFullYear()}.${pad2(date.getMonth()+1)}.${pad2(date.getDate())}`;
  const gmtH=(date.getUTCHours()+24)%24;

  const sessOk=(()=>{
    if(f.sess==="all")return true;
    const s=SESSIONS.find(x=>x.k===f.sess); if(!s)return true;
    return s.ini<=s.fim ? (gmtH>=s.ini&&gmtH<s.fim) : (gmtH>=s.ini||gmtH<s.fim);
  })();

  return[
    {k:"Hora",   ok:inWindow, want:`${pad2(f.h1)}:${pad2(f.m1)} → ${pad2(f.h2)}:${pad2(f.m2)}`+(a>b?" (cruza a meia-noite)":""), got:`${pad2(date.getHours())}:${pad2(date.getMinutes())}`},
    {k:"Semana", ok:f.dow.has(date.getDay()), want:DOW.filter(d=>f.dow.has(d[1])).map(d=>d[0]).join(" ")||"nenhum dia marcado", got:DOW_LONG[date.getDay()]},
    {k:"Dia",    ok:!dom||dom.has(date.getDate()), want:dom?f.dom:"todos os dias", got:"dia "+date.getDate()},
    {k:"Mês",    ok:!mon||mon.has(date.getMonth()+1), want:mon?f.mon:"todos os meses", got:"mês "+(date.getMonth()+1)},
    {k:"Ano",    ok:date.getFullYear()>=f.y1&&date.getFullYear()<=f.y2, want:`${f.y1} – ${f.y2}`, got:String(date.getFullYear())},
    {k:"Sessão", ok:sessOk, want:f.sess==="all"?"qualquer sessão":SESSIONS.find(x=>x.k===f.sess).n, got:pad2(gmtH)+":00 GMT"},
    {k:"Blackout",ok:!bl.has(stamp), want:bl.size?`${bl.size} data(s) vetada(s)`:"nenhuma data vetada", got:stamp}
  ];
}

const TRADES=(function(){
  const r=seeded(20260719);
  const out=[]; let eq=START_EQ, peak=START_EQ, maxDD=0;
  const now=new Date(); const start=new Date(now); start.setMonth(start.getMonth()-14);
  for(let i=1;i<=760;i++){
    const b=BOOK[Math.floor(r()*BOOK.length)];
    const t=new Date(start.getTime()+(now-start)*(i/760));
    t.setHours(6+Math.floor(r()*14),Math.floor(r()*60),0,0);
    if(t.getDay()===0||t.getDay()===6)t.setDate(t.getDate()+2);
    const side=r()>0.48?"COMPRA":"VENDA";
    const win=r()<0.46;
    const R=win?(0.8+r()*2.6):-(0.6+r()*0.55);
    const risk=eq*0.01;
    const pnl=+(R*risk).toFixed(2);
    const entry=(SEED_PX[b.sym]||100)*(0.85+r()*0.3);
    const dist=entry*(0.004+r()*0.02);
    const exit=+(entry+(side==="COMPRA"?1:-1)*dist*R).toFixed(4);
    eq+=pnl; peak=Math.max(peak,eq); maxDD=Math.max(maxDD,(peak-eq)/peak*100);
    const bars=Math.floor(2+r()*40);
    out.push({
      id:i, open:t, sym:b.sym, label:b.label, seg:b.seg, side,
      lots:+(0.05+r()*0.9).toFixed(2), entry:+entry.toFixed(4), exit,

      ea:EAS[Math.floor(r()*EAS.length)], why:win?WHY[Math.floor(r()*4)]:WHY[1+Math.floor(r()*7)]

  }
  out._maxDD=maxDD; out._final=eq;
  return out;
})();

function stats(list){
  const n=list.length;
  if(!n)return{n:0,pnl:0,wr:0,exp:0,pf:0,gross:0,loss:0};
  const wins=list.filter(t=>t.pnl>0), losses=list.filter(t=>t.pnl<=0);
  const gross=wins.reduce((a,t)=>a+t.pnl,0), loss=Math.abs(losses.reduce((a,t)=>a+t.pnl,0));
  const pnl=gross-loss;
  return{n, pnl, wr:wins.length/n*100, exp:pnl/n, pf:loss?gross/loss:Infinity,
         gross, loss, avgW:wins.length?gross/wins.length:0, avgL:losses.length?loss/losses.length:0};
}

   x:"Nenhuma fonte gratuita, sem chave e com CORS cobre US100, US500 ou XAU em julho de 2026. O caminho realista é Twelve Data com chave gratuita, ou um proxy de uma linha no seu servidor."}

function filterBlock(c,api){
  const H=api==="mql5"
    ? {dt:"MqlDateTime dt; TimeToStruct(t,dt);", y:"dt.year", mo:"dt.mon", d:"dt.day", dw:"dt.day_of_week", h:"dt.hour", mi:"dt.min"}
    : {dt:"", y:"TimeYear(t)", mo:"TimeMonth(t)", d:"TimeDay(t)", dw:"TimeDayOfWeek(t)", h:"TimeHour(t)", mi:"TimeMinute(t)"};
  return `
//+------------------------------------------------------------------+
//| Parser de lista com intervalos: "1,2,15-20,31"                   |
//| Devolve true se 'valor' pertence a lista. Lista vazia = livre.   |
//+------------------------------------------------------------------+
bool InList(const string lista,const int valor)
  {
   string s=lista;
   StringTrimLeft(s); StringTrimRight(s);
   if(StringLen(s)==0) return(true);            // sem restricao

   int ini=0;
   while(ini<=StringLen(s))
     {
      int vir=StringFind(s,",",ini);
      string tok=(vir<0)? StringSubstr(s,ini) : StringSubstr(s,ini,vir-ini);
      StringTrimLeft(tok); StringTrimRight(tok);

      if(StringLen(tok)>0)
        {
         int tra=StringFind(tok,"-");
         if(tra>0)                               // intervalo A-B
           {
            int a=(int)StringToInteger(StringSubstr(tok,0,tra));
            int b=(int)StringToInteger(StringSubstr(tok,tra+1));
            if(a>b){int aux=a; a=b; b=aux;}
            if(valor>=a && valor<=b) return(true);
           }
         else if(valor==(int)StringToInteger(tok)) return(true);
        }
      if(vir<0) break;
      ini=vir+1;
     }
   return(false);
  }

//+------------------------------------------------------------------+
//| Data 't' consta na lista de blackout? Formato AAAA.MM.DD          |
//+------------------------------------------------------------------+
bool EmBlackout(const datetime t)
  {
   string s=BlackoutDatas;
   StringTrimLeft(s); StringTrimRight(s);
   if(StringLen(s)==0) return(false);

   ${H.dt}
   string hoje=StringFormat("%04d.%02d.%02d",${H.y},${H.mo},${H.d});

   int ini=0;
   while(ini<=StringLen(s))
     {
      int vir=StringFind(s,",",ini);
      string tok=(vir<0)? StringSubstr(s,ini) : StringSubstr(s,ini,vir-ini);
      StringTrimLeft(tok); StringTrimRight(tok);
      if(tok==hoje) return(true);
      if(vir<0) break;
      ini=vir+1;
     }
   return(false);
  }

//+------------------------------------------------------------------+
//| Janela de minutos, tratando corretamente o cruzamento da         |
//| meia-noite. Se fim < inicio, o teste vira OU em vez de E.        |
//+------------------------------------------------------------------+
bool DentroDaJanela(const int agora,const int abre,const int fecha)
  {
   if(abre<=fecha) return(agora>=abre && agora<=fecha);
   return(agora>=abre || agora<=fecha);         // atravessa 00:00
  }

//+------------------------------------------------------------------+
//| Sessao em horario GMT. OffsetGMT ajusta a hora do servidor.      |
//+------------------------------------------------------------------+
bool DentroDaSessao(const int horaGMT)
  {
   if(SessaoAlvo==SESSAO_TODAS) return(true);
   int abre=0,fecha=0;
   switch(SessaoAlvo)
     {
      case SESSAO_ASIA:    abre=0;  fecha=9;  break;
      case SESSAO_LONDRES: abre=7;  fecha=16; break;
      case SESSAO_NY:      abre=12; fecha=21; break;
      default: return(true);
     }
   if(abre<=fecha) return(horaGMT>=abre && horaGMT<fecha);
   return(horaGMT>=abre || horaGMT<fecha);
  }

//+------------------------------------------------------------------+
//| AGREGADOR DE FILTROS                                             |
//| Uma unica porta de entrada. 'motivo' devolve o texto do bloqueio |
//| para o painel e para o log — filtro que barra em silencio e      |
//| indistinguivel de um bug.                                        |
//+------------------------------------------------------------------+
bool IsTradingAllowed(const datetime t,string &motivo)
  {
   ${H.dt}
   int ano=${H.y}, mes=${H.mo}, dia=${H.d}, dSem=${H.dw};
   int agora=${H.h}*60+${H.mi};
   int abre =HoraAbre*60+MinutoAbre;
   int fecha=HoraFecha*60+MinutoFecha;

   //--- 1. ano
   if(ano<AnoMinimo || ano>AnoMaximo)
     { motivo=StringFormat("ano %d fora de %d-%d",ano,AnoMinimo,AnoMaximo); return(false); }

   //--- 2. mes
   if(!InList(MesesPermitidos,mes))
     { motivo=StringFormat("mes %d nao permitido",mes); return(false); }

   //--- 3. dia do mes
   if(!InList(DiasDoMes,dia))
     { motivo=StringFormat("dia %d nao permitido",dia); return(false); }

   //--- 4. dia da semana
   bool diaOk=false;
   switch(dSem)
     {
      case 0: diaOk=OperarDomingo; break;
      case 1: diaOk=OperarSegunda; break;
      case 2: diaOk=OperarTerca;   break;
      case 3: diaOk=OperarQuarta;  break;
      case 4: diaOk=OperarQuinta;  break;
      case 5: diaOk=OperarSexta;   break;
      case 6: diaOk=OperarSabado;  break;
     }
   if(!diaOk) { motivo="dia da semana bloqueado"; return(false); }

   //--- 5. blackout
   if(EmBlackout(t)) { motivo="data em blackout"; return(false); }

   //--- 6. janela de horario
   if(!DentroDaJanela(agora,abre,fecha))
     { motivo=StringFormat("fora da janela %02d:%02d-%02d:%02d",
              HoraAbre,MinutoAbre,HoraFecha,MinutoFecha); return(false); }

   //--- 7. sessao
   int horaGMT=(${H.h}-OffsetGMT+24)%24;
   if(!DentroDaSessao(horaGMT))
     { motivo="fora da sessao alvo"; return(false); }

   motivo="liberado";
   return(true);
  }`;
}

function genMQL5(c){
  const f=c.f;
  return `//+------------------------------------------------------------------+
//|  ${c.name}.mq5

//|                                                                  
//|  ATENCAO: valide em backtest "Every tick based on real ticks"    
//|  por no minimo 2 anos e faca forward em demo antes de conta real.
//+------------------------------------------------------------------+
#property copyright "MESA Trading Desk"

input int     PeriodoEmaLenta  = 21;              // EMA lenta
input int     PeriodoEmaFiltro = 50;              // EMA de tendencia

input int     MacdLenta        = 26;              // MACD lenta
input int     MacdSinal        = 9;               // MACD sinal

input double  PesoRSI          = ${c.w.rsi};      // Peso do RSI

input double  PesoBandas       = ${c.w.bb};       // Peso das bandas
input double  PesoADX          = ${c.w.adx};      // Peso do ADX
input double  PesoATR          = ${c.w.atr};      // Peso da volatilidade
input double  LimiarCompra     = ${c.buy};        // Score minimo para comprar
input double  LimiarVenda      = ${c.sell};       // Score (modulo) para vender

//==================== 4. FILTRO DE HORARIO ==========================
input group "=== 4. Filtro de horario ==="
input int     HoraAbre         = ${f.h1};         // Hora de abertura
input int     MinutoAbre       = ${f.m1};         // Minuto de abertura
input int     HoraFecha        = ${f.h2};         // Hora de fechamento
input int     MinutoFecha      = ${f.m2};         // Minuto de fechamento
input int     OffsetGMT        = ${f.gmt};        // Offset GMT do servidor

//==================== 5. DIAS DA SEMANA =============================
input group "=== 5. Dias da semana ==="
input bool    OperarSegunda    = ${c.dow(1)};     // Segunda
input bool    OperarTerca      = ${c.dow(2)};     // Terca
input bool    OperarQuarta     = ${c.dow(3)};     // Quarta
input bool    OperarQuinta     = ${c.dow(4)};     // Quinta
input bool    OperarSexta      = ${c.dow(5)};     // Sexta
input bool    OperarSabado     = ${c.dow(6)};     // Sabado
input bool    OperarDomingo    = ${c.dow(0)};     // Domingo

//==================== 6. CALENDARIO =================================
input group "=== 6. Dia, mes e ano ==="
input string  DiasDoMes        = "${f.dom}";      // Dias do mes: 1,2,15-20,31
input string  MesesPermitidos  = "${f.mon}";      // Meses: 1-6,9,10-12
input int     AnoMinimo        = ${f.y1};         // Ano minimo
input int     AnoMaximo        = ${f.y2};         // Ano maximo
input string  BlackoutDatas    = "${f.black}";    // Blackout: AAAA.MM.DD,...
input ENUM_SESSAO SessaoAlvo   = ${["all","asia","london","ny"].indexOf(f.sess)===0?"SESSAO_TODAS":f.sess==="asia"?"SESSAO_ASIA":f.sess==="london"?"SESSAO_LONDRES":"SESSAO_NY"}; // Sessao

//==================== 7. RISCO ======================================
input group "=== 7. Risco e lote ==="
input ENUM_LOTE ModoLote       = ${c.mode==="risk"?"LOTE_RISCO":"LOTE_FIXO"}; // Dimensionamento
input double  RiscoPercentual  = ${c.rv};         // Risco por operacao (%)
input double  LoteFixo         = 0.10;            // Lote fixo
input double  LoteMaximo       = 5.0;             // Teto de lote

//==================== 8. STOPS ======================================
input group "=== 8. Stops e alvos ==="
input double  StopATR          = ${c.sl};         // Stop em multiplos de ATR
input double  AlvoATR          = ${c.tp};         // Alvo em multiplos de ATR
input double  TrailingATR      = ${c.tr};         // Trailing em multiplos de ATR
input double  BreakEvenATR     = ${c.be};         // Gatilho de break-even (ATR)
input bool    UsarTrailing     = true;            // Ativar trailing
input bool    UsarBreakEven    = true;            // Ativar break-even

//==================== 9. LIMITES ====================================
input group "=== 9. Limites diarios ==="
input double  PerdaDiariaMax   = ${c.dl};         // Perda diaria maxima (%)
input double  MetaDiaria       = ${c.dg};         // Meta diaria (%)
input int     MaxPosicoes      = ${c.mp};         // Posicoes simultaneas
input int     MaxTradesDia     = ${c.md};         // Trades por dia
input int     SpreadMaximo     = ${c.sp};         // Spread maximo (pontos)

//==================== 10. ENCERRAMENTO ==============================
input group "=== 10. Encerramento e painel ==="
input bool    FecharNoFimJanela= ${f.closeEnd};   // Zerar ao fechar a janela
input bool    FecharNaSexta    = ${f.closeFri};   // Zerar antes do fim de semana
input int     HoraFecharSexta  = 20;              // Hora do corte de sexta
input bool    MostrarPainel    = true;            // Painel no grafico

//==================== ESTADO GLOBAL =================================
CTrade        trade;
CPositionInfo posInfo;
CSymbolInfo   simbolo;

int hEmaR,hEmaL,hEmaF,hRSI,hMACD,hATR,hBB,hADX;
datetime  ultimaBarra=0;
double    saldoAbertura=0.0;
int       tradesHoje=0;
int       diaCorrente=-1;
string    ultimoMotivo="";
double    ultimoScore=0.0;

struct IndicatorSnapshot
  {
   double emaR,emaL,emaF,emaRant,emaLant;
   double rsi,rsiAnt;
   double macd,macdSig,macdHist,macdHistAnt;
   double atr,bbSup,bbInf,bbMid;
   double adx,pdi,ndi;
   double preco;
  };

${filterBlock(c,"mql5")}

//+------------------------------------------------------------------+
//| Le todos os indicadores do candle fechado (shift 1) e do anterior|
//+------------------------------------------------------------------+
bool ReadIndicators(IndicatorSnapshot &s)
  {
   double b[3];
   if(CopyBuffer(hEmaR,0,1,2,b)<2) return(false); s.emaR=b[1]; s.emaRant=b[0];
   if(CopyBuffer(hEmaL,0,1,2,b)<2) return(false); s.emaL=b[1]; s.emaLant=b[0];
   if(CopyBuffer(hEmaF,0,1,1,b)<1) return(false); s.emaF=b[0];
   if(CopyBuffer(hRSI ,0,1,2,b)<2) return(false); s.rsi =b[1]; s.rsiAnt=b[0];
   if(CopyBuffer(hATR ,0,1,1,b)<1) return(false); s.atr =b[0];

   double m[2],g[2];
   if(CopyBuffer(hMACD,0,1,2,m)<2) return(false);
   if(CopyBuffer(hMACD,1,1,2,g)<2) return(false);
   s.macd=m[1]; s.macdSig=g[1];
   s.macdHist   =m[1]-g[1];
   s.macdHistAnt=m[0]-g[0];

   if(CopyBuffer(hBB,0,1,1,b)<1) return(false); s.bbMid=b[0];
   if(CopyBuffer(hBB,1,1,1,b)<1) return(false); s.bbSup=b[0];
   if(CopyBuffer(hBB,2,1,1,b)<1) return(false); s.bbInf=b[0];

   if(CopyBuffer(hADX,0,1,1,b)<1) return(false); s.adx=b[0];
   if(CopyBuffer(hADX,1,1,1,b)<1) return(false); s.pdi=b[0];
   if(CopyBuffer(hADX,2,1,1,b)<1) return(false); s.ndi=b[0];

   s.preco=iClose(_Symbol,PERIOD_CURRENT,1);
   return(true);
  }

//+------------------------------------------------------------------+
//| MOTOR DE SINAL                                                   |
//| Cada indicador devolve uma contribuicao normalizada em -1..+1,   |
//| multiplicada pelo seu peso. A soma e dividida pelo total dos     |
//| pesos e escalada para -100..+100.                                |
//+------------------------------------------------------------------+
double ComputeScore(const IndicatorSnapshot &s)
  {
   double soma=0.0, total=0.0;

   //--- direcao primaria: distancia percentual entre as medias
   if(PesoEMA>0)
     {
      double sp=(s.emaR-s.emaL)/s.preco*100.0;
      soma+=MathMax(-1.0,MathMin(1.0,sp*22.0))*PesoEMA; total+=PesoEMA;
     }
   //--- exaustao
   if(PesoRSI>0)
     {
      double v=(s.rsi-50.0)/28.0;
      soma+=MathMax(-1.0,MathMin(1.0,v))*PesoRSI; total+=PesoRSI;
     }
   //--- aceleracao, normalizada pelo ATR para virar adimensional
   if(PesoMACD>0 && s.atr>0)
     {
      double v=s.macdHist/s.atr*3.2;
      soma+=MathMax(-1.0,MathMin(1.0,v))*PesoMACD; total+=PesoMACD;
     }
   //--- posicao no canal: contrario, banda superior pesa para venda
   if(PesoBandas>0 && (s.bbSup-s.bbInf)>0)
     {
      double pos=(s.preco-s.bbInf)/(s.bbSup-s.bbInf)*100.0;
      double v=-(pos-50.0)/44.0;
      soma+=MathMax(-1.0,MathMin(1.0,v))*PesoBandas; total+=PesoBandas;
     }
   //--- forca: so conta se houver tendencia
   if(PesoADX>0)
     {
      double dir=(s.pdi-s.ndi)/40.0;
      double frc=MathMax(0.0,MathMin(1.0,(s.adx-18.0)/28.0));
      soma+=MathMax(-1.0,MathMin(1.0,dir))*frc*PesoADX; total+=PesoADX;
     }
   //--- volatilidade: permissao, nao direcao
   if(PesoATR>0 && s.preco>0)
     {
      double atrPct=s.atr/s.preco*100.0;
      double calmo=MathMax(-1.0,MathMin(1.0,1.0-(atrPct-0.55)/1.6));
      double sinal=(s.emaR>=s.emaL)? 1.0 : -1.0;
      soma+=calmo*sinal*0.75*PesoATR; total+=PesoATR;
     }

   if(total<=0.0) return(0.0);
   return(soma/total*100.0);
  }

//+------------------------------------------------------------------+
//| GESTAO DE RISCO — lote a partir da distancia do stop             |
//+------------------------------------------------------------------+
double CalcLot(const double distancia)
  {
   if(ModoLote==LOTE_FIXO) return(NormalizarLote(LoteFixo));
   if(distancia<=0.0)      return(NormalizarLote(LoteFixo));

   double tickValor=SymbolInfoDouble(_Symbol,SYMBOL_TRADE_TICK_VALUE);
   double tickTam  =SymbolInfoDouble(_Symbol,SYMBOL_TRADE_TICK_SIZE);
   if(tickTam<=0.0 || tickValor<=0.0) return(NormalizarLote(LoteFixo));

   double risco=AccountInfoDouble(ACCOUNT_BALANCE)*RiscoPercentual/100.0;
   double perdaPorLote=distancia/tickTam*tickValor;
   if(perdaPorLote<=0.0) return(NormalizarLote(LoteFixo));

   return(NormalizarLote(risco/perdaPorLote));
  }

double NormalizarLote(double lote)
  {
   double mn=SymbolInfoDouble(_Symbol,SYMBOL_VOLUME_MIN);
   double mx=SymbolInfoDouble(_Symbol,SYMBOL_VOLUME_MAX);
   double st=SymbolInfoDouble(_Symbol,SYMBOL_VOLUME_STEP);
   if(st<=0.0) st=0.01;
   lote=MathFloor(lote/st)*st;
   lote=MathMin(lote,MathMin(mx,LoteMaximo));
   lote=MathMax(lote,mn);
   return(NormalizeDouble(lote,2));
  }

//+------------------------------------------------------------------+
//| Caixa do dia reconstruida do historico — sobrevive a restart     |
//+------------------------------------------------------------------+
double LucroDoDia()
  {
   datetime hoje=(datetime)(TimeCurrent()-TimeCurrent()%86400);
   if(!HistorySelect(hoje,TimeCurrent()+60)) return(0.0);

   double soma=0.0;
   int n=HistoryDealsTotal();
   for(int i=0;i<n;i++)
     {
      ulong t=HistoryDealGetTicket(i);
      if(t==0) continue;
      if(HistoryDealGetInteger(t,DEAL_MAGIC)!=MagicNumber) continue;
      if(HistoryDealGetString(t,DEAL_SYMBOL)!=_Symbol)     continue;
      soma+=HistoryDealGetDouble(t,DEAL_PROFIT)
           +HistoryDealGetDouble(t,DEAL_SWAP)
           +HistoryDealGetDouble(t,DEAL_COMMISSION);
     }
   return(soma);
  }

int ContarPosicoes()
  {
   int n=0;
   for(int i=PositionsTotal()-1;i>=0;i--)
      if(posInfo.SelectByIndex(i))
         if(posInfo.Magic()==MagicNumber && posInfo.Symbol()==_Symbol) n++;
   return(n);
  }

void FecharTodas(const string razao)
  {
   for(int i=PositionsTotal()-1;i>=0;i--)
      if(posInfo.SelectByIndex(i))
         if(posInfo.Magic()==MagicNumber && posInfo.Symbol()==_Symbol)
            if(!trade.PositionClose(posInfo.Ticket()))
               PrintFormat("Falha ao fechar #%I64u (%s): %d",
                           posInfo.Ticket(),razao,trade.ResultRetcode());
  }

//+------------------------------------------------------------------+
//| Break-even e trailing por ATR                                    |
//+------------------------------------------------------------------+
void GerenciarAbertas(const double atr)
  {
   if(atr<=0.0) return;
   for(int i=PositionsTotal()-1;i>=0;i--)
     {
      if(!posInfo.SelectByIndex(i)) continue;
      if(posInfo.Magic()!=MagicNumber || posInfo.Symbol()!=_Symbol) continue;

      double abertura=posInfo.PriceOpen();
      double sl=posInfo.StopLoss(), tp=posInfo.TakeProfit();
      double atual=posInfo.PriceCurrent();
      bool   compra=(posInfo.PositionType()==POSITION_TYPE_BUY);
      double novo=sl;

      if(UsarBreakEven && BreakEvenATR>0.0)
        {
         double gatilho=BreakEvenATR*atr;
         if(compra && atual-abertura>=gatilho && (sl<abertura || sl==0.0)) novo=abertura;
         if(!compra && abertura-atual>=gatilho && (sl>abertura || sl==0.0)) novo=abertura;
        }
      if(UsarTrailing && TrailingATR>0.0)
        {
         double dist=TrailingATR*atr;
         if(compra)  { double t=atual-dist; if(t>novo) novo=t; }
         else        { double t=atual+dist; if(novo==0.0 || t<novo) novo=t; }
        }

      novo=NormalizeDouble(novo,_Digits);
      if(novo!=NormalizeDouble(sl,_Digits) && novo>0.0)
         if(!trade.PositionModify(posInfo.Ticket(),novo,tp))
            PrintFormat("PositionModify falhou: %d",trade.ResultRetcode());
     }
  }

//+------------------------------------------------------------------+
//| Nova barra fechada?                                              |
//+------------------------------------------------------------------+
bool IsNewBar()
  {
   datetime t=iTime(_Symbol,PERIOD_CURRENT,0);
   if(t==ultimaBarra) return(false);
   ultimaBarra=t;
   return(true);
  }

//+------------------------------------------------------------------+
void DrawPanel(const IndicatorSnapshot &s,const double score,
               const string motivo,const bool liberado)
  {
   if(!MostrarPainel) return;
   double lucro=LucroDoDia();
   long   spread=SymbolInfoInteger(_Symbol,SYMBOL_SPREAD);

   string p="";
   p+="  M E S A  ·  ${c.name}\\n";
   p+="  ------------------------------------------\\n";
   p+=StringFormat("  Score        : %+7.1f   (compra %.0f / venda %.0f)\\n",
                   score,LimiarCompra,LimiarVenda);
   p+=StringFormat("  Filtros      : %s\\n",(liberado?"LIBERADO":"BLOQUEADO - "+motivo));
   p+="  ------------------------------------------\\n";
   p+=StringFormat("  EMA %d/%d     : %.5f / %.5f\\n",
                   PeriodoEmaRapida,PeriodoEmaLenta,s.emaR,s.emaL);
   p+=StringFormat("  RSI          : %.1f\\n",s.rsi);
   p+=StringFormat("  MACD hist    : %.5f\\n",s.macdHist);
   p+=StringFormat("  ATR          : %.5f  (%.2f%%)\\n",
                   s.atr,(s.preco>0? s.atr/s.preco*100.0 : 0.0));
   p+=StringFormat("  ADX          : %.1f  (+DI %.1f / -DI %.1f)\\n",s.adx,s.pdi,s.ndi);
   p+="  ------------------------------------------\\n";
   p+=StringFormat("  Resultado dia: %.2f\\n",lucro);
   p+=StringFormat("  Trades hoje  : %d de %d\\n",tradesHoje,MaxTradesDia);
   p+=StringFormat("  Posicoes     : %d de %d\\n",ContarPosicoes(),MaxPosicoes);
   p+=StringFormat("  Spread       : %d (teto %d)\\n",(int)spread,SpreadMaximo);
   Comment(p);
  }

//+------------------------------------------------------------------+
int OnInit()
  {
   if(PeriodoEmaRapida>=PeriodoEmaLenta)
     { Print("EMA rapida deve ser menor que a lenta."); return(INIT_PARAMETERS_INCORRECT); }
   if(HoraAbre<0||HoraAbre>23||HoraFecha<0||HoraFecha>23)
     { Print("Horas fora do intervalo 0-23."); return(INIT_PARAMETERS_INCORRECT); }
   if(RiscoPercentual<=0.0||RiscoPercentual>10.0)
     { Print("Risco por operacao fora de 0-10%."); return(INIT_PARAMETERS_INCORRECT); }
   if(StopATR<=0.0)
     { Print("StopATR deve ser positivo."); return(INIT_PARAMETERS_INCORRECT); }

   hEmaR=iMA(_Symbol,PERIOD_CURRENT,PeriodoEmaRapida,0,MODE_EMA,PRICE_CLOSE);
   hEmaL=iMA(_Symbol,PERIOD_CURRENT,PeriodoEmaLenta ,0,MODE_EMA,PRICE_CLOSE);
   hEmaF=iMA(_Symbol,PERIOD_CURRENT,PeriodoEmaFiltro,0,MODE_EMA,PRICE_CLOSE);
   hRSI =iRSI(_Symbol,PERIOD_CURRENT,PeriodoRSI,PRICE_CLOSE);
   hMACD=iMACD(_Symbol,PERIOD_CURRENT,MacdRapida,MacdLenta,MacdSinal,PRICE_CLOSE);
   hATR =iATR(_Symbol,PERIOD_CURRENT,PeriodoATR);
   hBB  =iBands(_Symbol,PERIOD_CURRENT,PeriodoBandas,0,DesvioBandas,PRICE_CLOSE);
   hADX =iADX(_Symbol,PERIOD_CURRENT,PeriodoADX);

   if(hEmaR==INVALID_HANDLE||hEmaL==INVALID_HANDLE||hEmaF==INVALID_HANDLE||
      hRSI ==INVALID_HANDLE||hMACD==INVALID_HANDLE||hATR ==INVALID_HANDLE||
      hBB  ==INVALID_HANDLE||hADX ==INVALID_HANDLE)
     { Print("Falha ao criar handles de indicador."); return(INIT_FAILED); }

   trade.SetExpertMagicNumber(MagicNumber);
   trade.SetDeviationInPoints(SlippagePontos);
   trade.SetTypeFillingBySymbol(_Symbol);
   simbolo.Name(_Symbol);

   saldoAbertura=AccountInfoDouble(ACCOUNT_BALANCE);
   MqlDateTime dt; TimeToStruct(TimeCurrent(),dt);
   diaCorrente=dt.day;

   PrintFormat("%s iniciado. Janela %02d:%02d-%02d:%02d, risco %.2f%%.",
               "${c.name}",HoraAbre,MinutoAbre,HoraFecha,MinutoFecha,RiscoPercentual);
   return(INIT_SUCCEEDED);
  }

void OnDeinit(const int reason)
  {
   IndicatorRelease(hEmaR); IndicatorRelease(hEmaL); IndicatorRelease(hEmaF);
   IndicatorRelease(hRSI);  IndicatorRelease(hMACD); IndicatorRelease(hATR);
   IndicatorRelease(hBB);   IndicatorRelease(hADX);
   Comment("");
  }

//+------------------------------------------------------------------+
void OnTick()
  {
   if(!MQLInfoInteger(MQL_TRADE_ALLOWED)) return;
   if(!IsNewBar())                        return;

   //--- vira o dia: zera contadores
   MqlDateTime dt; TimeToStruct(TimeCurrent(),dt);
   if(dt.day!=diaCorrente)
     {
      diaCorrente=dt.day;
      tradesHoje=0;
      saldoAbertura=AccountInfoDouble(ACCOUNT_BALANCE)-LucroDoDia();
     }

   IndicatorSnapshot s;
   if(!ReadIndicators(s)) return;

   double score=ComputeScore(s);
   ultimoScore=score;

   string motivo="";
   bool liberado=IsTradingAllowed(TimeCurrent(),motivo);
   ultimoMotivo=motivo;

   GerenciarAbertas(s.atr);
   DrawPanel(s,score,motivo,liberado);

   //--- corte de janela e de sexta-feira
   if(FecharNoFimJanela && !liberado && StringFind(motivo,"janela")>=0)
     { FecharTodas("fim de janela"); return; }
   if(FecharNaSexta && dt.day_of_week==5 && dt.hour>=HoraFecharSexta)
     { FecharTodas("fechamento de sexta"); return; }

   if(!liberado) return;

   //--- guardas diarias
   double lucro=LucroDoDia();
   double base =(saldoAbertura>0.0? saldoAbertura : AccountInfoDouble(ACCOUNT_BALANCE));
   if(PerdaDiariaMax>0.0 && lucro<=-base*PerdaDiariaMax/100.0)
     { ultimoMotivo="perda diaria atingida"; return; }
   if(MetaDiaria>0.0 && lucro>=base*MetaDiaria/100.0)
     { ultimoMotivo="meta diaria atingida"; return; }
   if(tradesHoje>=MaxTradesDia)  return;
   if(ContarPosicoes()>=MaxPosicoes) return;

   //--- custo de entrada
   if(SymbolInfoInteger(_Symbol,SYMBOL_SPREAD)>SpreadMaximo)
     { ultimoMotivo="spread acima do teto"; return; }

   //--- decisao
   if(score>=LimiarCompra)      AbrirPosicao(true ,s);
   else if(score<=-LimiarVenda) AbrirPosicao(false,s);
  }

//+------------------------------------------------------------------+
void AbrirPosicao(const bool compra,const IndicatorSnapshot &s)
  {
   if(!simbolo.RefreshRates()) return;
   if(s.atr<=0.0) return;

   double preco   = compra? simbolo.Ask() : simbolo.Bid();
   double distSL  = StopATR*s.atr;
   double distTP  = AlvoATR*s.atr;
   double sl      = compra? preco-distSL : preco+distSL;
   double tp      = compra? preco+distTP : preco-distTP;

   //--- respeita a distancia minima da corretora
   long   stopsLv = SymbolInfoInteger(_Symbol,SYMBOL_TRADE_STOPS_LEVEL);
   double minDist = stopsLv*_Point;
   if(MathAbs(preco-sl)<minDist) sl = compra? preco-minDist : preco+minDist;
   if(MathAbs(tp-preco)<minDist) tp = compra? preco+minDist : preco-minDist;

   sl=NormalizeDouble(sl,_Digits);
   tp=NormalizeDouble(tp,_Digits);

   double lote=CalcLot(MathAbs(preco-sl));
   if(lote<=0.0) return;

   bool ok = compra? trade.Buy (lote,_Symbol,preco,sl,tp,ComentarioOrdem)
                   : trade.Sell(lote,_Symbol,preco,sl,tp,ComentarioOrdem);
   if(ok)
     {
      tradesHoje++;
      PrintFormat("%s %.2f @ %.5f  SL %.5f  TP %.5f  score %.1f",
                  (compra?"COMPRA":"VENDA"),lote,preco,sl,tp,ultimoScore);
     }
   else
      PrintFormat("Ordem rejeitada: retcode %d, erro %d",
                  trade.ResultRetcode(),GetLastError());
  }
//+------------------------------------------------------------------+
`;
}

struct IndicatorSnapshot
  {
   double emaR,emaL,emaF,emaRant,emaLant;

//+------------------------------------------------------------------+
//| Leitura dos indicadores — MQL4 le por shift, sem handles         |
//+------------------------------------------------------------------+
bool ReadIndicators(IndicatorSnapshot &s)
  {
   if(Bars<MathMax(PeriodoEmaFiltro,PeriodoADX*3)+5) return(false);

   s.emaR   =iMA(Symbol(),0,PeriodoEmaRapida,0,MODE_EMA,PRICE_CLOSE,1);
   s.emaRant=iMA(Symbol(),0,PeriodoEmaRapida,0,MODE_EMA,PRICE_CLOSE,2);
   s.emaL   =iMA(Symbol(),0,PeriodoEmaLenta ,0,MODE_EMA,PRICE_CLOSE,1);
   s.emaLant=iMA(Symbol(),0,PeriodoEmaLenta ,0,MODE_EMA,PRICE_CLOSE,2);
   s.emaF   =iMA(Symbol(),0,PeriodoEmaFiltro,0,MODE_EMA,PRICE_CLOSE,1);

   s.rsi    =iRSI(Symbol(),0,PeriodoRSI,PRICE_CLOSE,1);
   s.rsiAnt =iRSI(Symbol(),0,PeriodoRSI,PRICE_CLOSE,2);

   s.macd   =iMACD(Symbol(),0,MacdRapida,MacdLenta,MacdSinal,PRICE_CLOSE,MODE_MAIN  ,1);
   s.macdSig=iMACD(Symbol(),0,MacdRapida,MacdLenta,MacdSinal,PRICE_CLOSE,MODE_SIGNAL,1);
   s.macdHist=s.macd-s.macdSig;
   s.macdHistAnt=iMACD(Symbol(),0,MacdRapida,MacdLenta,MacdSinal,PRICE_CLOSE,MODE_MAIN,2)
                -iMACD(Symbol(),0,MacdRapida,MacdLenta,MacdSinal,PRICE_CLOSE,MODE_SIGNAL,2);

   s.atr    =iATR(Symbol(),0,PeriodoATR,1);
   s.bbSup  =iBands(Symbol(),0,PeriodoBandas,DesvioBandas,0,PRICE_CLOSE,MODE_UPPER,1);
   s.bbInf  =iBands(Symbol(),0,PeriodoBandas,DesvioBandas,0,PRICE_CLOSE,MODE_LOWER,1);
   s.bbMid  =iBands(Symbol(),0,PeriodoBandas,DesvioBandas,0,PRICE_CLOSE,MODE_MAIN ,1);

   s.adx    =iADX(Symbol(),0,PeriodoADX,PRICE_CLOSE,MODE_MAIN   ,1);
   s.pdi    =iADX(Symbol(),0,PeriodoADX,PRICE_CLOSE,MODE_PLUSDI ,1);
   s.ndi    =iADX(Symbol(),0,PeriodoADX,PRICE_CLOSE,MODE_MINUSDI,1);

   s.preco  =Close[1];
   return(s.atr>0.0);
  }

//+------------------------------------------------------------------+
//| MOTOR DE SINAL — identico ao da versao MQL5                      |
//+------------------------------------------------------------------+
double ComputeScore(const IndicatorSnapshot &s)
  {
   double soma=0.0,total=0.0;

   if(PesoEMA>0 && s.preco>0)
     {
      double sp=(s.emaR-s.emaL)/s.preco*100.0;
      soma+=MathMax(-1.0,MathMin(1.0,sp*22.0))*PesoEMA; total+=PesoEMA;
     }
   if(PesoRSI>0)
     {
      soma+=MathMax(-1.0,MathMin(1.0,(s.rsi-50.0)/28.0))*PesoRSI; total+=PesoRSI;
     }
   if(PesoMACD>0 && s.atr>0)
     {
      soma+=MathMax(-1.0,MathMin(1.0,s.macdHist/s.atr*3.2))*PesoMACD; total+=PesoMACD;
     }
   if(PesoBandas>0 && (s.bbSup-s.bbInf)>0)
     {
      double pos=(s.preco-s.bbInf)/(s.bbSup-s.bbInf)*100.0;
      soma+=MathMax(-1.0,MathMin(1.0,-(pos-50.0)/44.0))*PesoBandas; total+=PesoBandas;
     }
   if(PesoADX>0)
     {
      double dir=(s.pdi-s.ndi)/40.0;
      double frc=MathMax(0.0,MathMin(1.0,(s.adx-18.0)/28.0));
      soma+=MathMax(-1.0,MathMin(1.0,dir))*frc*PesoADX; total+=PesoADX;
     }
   if(PesoATR>0 && s.preco>0)
     {
      double atrPct=s.atr/s.preco*100.0;
      double calmo=MathMax(-1.0,MathMin(1.0,1.0-(atrPct-0.55)/1.6));
      double sinal=(s.emaR>=s.emaL)? 1.0 : -1.0;
      soma+=calmo*sinal*0.75*PesoATR; total+=PesoATR;
     }

   if(total<=0.0) return(0.0);
   return(soma/total*100.0);
  }

//+------------------------------------------------------------------+
double NormalizarLote(double lote)
  {
   double mn=MarketInfo(Symbol(),MODE_MINLOT);
   double mx=MarketInfo(Symbol(),MODE_MAXLOT);
   double st=MarketInfo(Symbol(),MODE_LOTSTEP);
   if(st<=0.0) st=0.01;
   lote=MathFloor(lote/st)*st;
   lote=MathMin(lote,MathMin(mx,LoteMaximo));
   lote=MathMax(lote,mn);
   return(NormalizeDouble(lote,2));
  }

double CalcLot(const double distancia)
  {
   if(ModoLote==LOTE_FIXO || distancia<=0.0) return(NormalizarLote(LoteFixo));
   double tickValor=MarketInfo(Symbol(),MODE_TICKVALUE);
   double tickTam  =MarketInfo(Symbol(),MODE_TICKSIZE);
   if(tickTam<=0.0 || tickValor<=0.0) return(NormalizarLote(LoteFixo));
   double risco=AccountBalance()*RiscoPercentual/100.0;
   double perdaPorLote=distancia/tickTam*tickValor;
   if(perdaPorLote<=0.0) return(NormalizarLote(LoteFixo));
   return(NormalizarLote(risco/perdaPorLote));
  }

//+------------------------------------------------------------------+
double LucroDoDia()
  {
   double soma=0.0;
   datetime hoje=(datetime)(TimeCurrent()-TimeCurrent()%86400);
   for(int i=OrdersHistoryTotal()-1;i>=0;i--)
     {
      if(!OrderSelect(i,SELECT_BY_POS,MODE_HISTORY)) continue;
      if(OrderMagicNumber()!=MagicNumber || OrderSymbol()!=Symbol()) continue;
      if(OrderCloseTime()<hoje) continue;
      soma+=OrderProfit()+OrderSwap()+OrderCommission();
     }
   for(int j=OrdersTotal()-1;j>=0;j--)
     {
      if(!OrderSelect(j,SELECT_BY_POS,MODE_TRADES)) continue;
      if(OrderMagicNumber()!=MagicNumber || OrderSymbol()!=Symbol()) continue;
      soma+=OrderProfit()+OrderSwap()+OrderCommission();
     }
   return(soma);
  }

int ContarPosicoes()
  {
   int n=0;
   for(int i=OrdersTotal()-1;i>=0;i--)
     {
      if(!OrderSelect(i,SELECT_BY_POS,MODE_TRADES)) continue;
      if(OrderMagicNumber()==MagicNumber && OrderSymbol()==Symbol()
         && (OrderType()==OP_BUY || OrderType()==OP_SELL)) n++;
     }
   return(n);
  }

void FecharTodas(const string razao)
  {
   for(int i=OrdersTotal()-1;i>=0;i--)
     {
      if(!OrderSelect(i,SELECT_BY_POS,MODE_TRADES)) continue;
      if(OrderMagicNumber()!=MagicNumber || OrderSymbol()!=Symbol()) continue;
      RefreshRates();
      double px=(OrderType()==OP_BUY)? Bid : Ask;
      if(OrderType()==OP_BUY || OrderType()==OP_SELL)
         if(!OrderClose(OrderTicket(),OrderLots(),NormalizeDouble(px,Digits),
                        (int)(SlippagePontos*pipMult),clrNONE))
            Print("Falha ao fechar (",razao,"): ",GetLastError());
     }
  }

void GerenciarAbertas(const double atr)
  {
   if(atr<=0.0) return;
   for(int i=OrdersTotal()-1;i>=0;i--)
     {
      if(!OrderSelect(i,SELECT_BY_POS,MODE_TRADES)) continue;
      if(OrderMagicNumber()!=MagicNumber || OrderSymbol()!=Symbol()) continue;
      if(OrderType()!=OP_BUY && OrderType()!=OP_SELL) continue;

      RefreshRates();
      bool   compra=(OrderType()==OP_BUY);
      double atual =compra? Bid : Ask;
      double sl    =OrderStopLoss();
      double novo  =sl;

      if(UsarBreakEven && BreakEvenATR>0.0)
        {
         double gat=BreakEvenATR*atr;
         if(compra  && atual-OrderOpenPrice()>=gat && (sl<OrderOpenPrice()||sl==0.0)) novo=OrderOpenPrice();
         if(!compra && OrderOpenPrice()-atual>=gat && (sl>OrderOpenPrice()||sl==0.0)) novo=OrderOpenPrice();
        }
      if(UsarTrailing && TrailingATR>0.0)
        {
         double d=TrailingATR*atr;
         if(compra)  { double t=atual-d; if(t>novo) novo=t; }
         else        { double t=atual+d; if(novo==0.0||t<novo) novo=t; }
        }

      novo=NormalizeDouble(novo,Digits);
      if(novo>0.0 && novo!=NormalizeDouble(sl,Digits))
         if(!OrderModify(OrderTicket(),OrderOpenPrice(),novo,OrderTakeProfit(),0,clrNONE))
            Print("OrderModify falhou: ",GetLastError());
     }
  }

bool IsNewBar()
  {
   if(Time[0]==ultimaBarra) return(false);
   ultimaBarra=Time[0];
   return(true);
  }

                   (int)MarketInfo(Symbol(),MODE_SPREAD),SpreadMaximo);
   Comment(p);
  }

   if(RiscoPercentual<=0.0||RiscoPercentual>10.0)
     { Print("Risco fora de 0-10%."); return(INIT_PARAMETERS_INCORRECT); }

   if(Digits==3 || Digits==5) pipMult=10.0;

   Print("${c.name} iniciado. Janela ",HoraAbre,":",MinutoAbre,
         "-",HoraFecha,":",MinutoFecha,", risco ",RiscoPercentual,"%.");
   return(INIT_SUCCEEDED);
  }

//+------------------------------------------------------------------+
void OnTick()
  {
   if(!IsTradeAllowed()) return;
   if(!IsNewBar())       return;

   if(TimeDay(TimeCurrent())!=diaCorrente)
     {
      diaCorrente=TimeDay(TimeCurrent());
      tradesHoje=0;
      saldoAbertura=AccountBalance()-LucroDoDia();
     }

   IndicatorSnapshot s;
   if(!ReadIndicators(s)) return;

   double score=ComputeScore(s);
   string motivo="";
   bool liberado=IsTradingAllowed(TimeCurrent(),motivo);
   ultimoMotivo=motivo;

   GerenciarAbertas(s.atr);
   DrawPanel(s,score,motivo,liberado);

   if(FecharNoFimJanela && !liberado && StringFind(motivo,"janela")>=0)
     { FecharTodas("fim de janela"); return; }
   if(FecharNaSexta && TimeDayOfWeek(TimeCurrent())==5 && TimeHour(TimeCurrent())>=HoraFecharSexta)
     { FecharTodas("fechamento de sexta"); return; }

   if(!liberado) return;

   double lucro=LucroDoDia();
   double base =(saldoAbertura>0.0? saldoAbertura : AccountBalance());
   if(PerdaDiariaMax>0.0 && lucro<=-base*PerdaDiariaMax/100.0) return;
   if(MetaDiaria>0.0     && lucro>= base*MetaDiaria/100.0)     return;
   if(tradesHoje>=MaxTradesDia)      return;
   if(ContarPosicoes()>=MaxPosicoes) return;
   if(MarketInfo(Symbol(),MODE_SPREAD)>SpreadMaximo) return;

   if(score>=LimiarCompra)      AbrirPosicao(true ,s);
   else if(score<=-LimiarVenda) AbrirPosicao(false,s);
  }

void AbrirPosicao(const bool compra,const IndicatorSnapshot &s)
  {
   if(s.atr<=0.0) return;

   for(int tent=0;tent<3;tent++)
     {
      RefreshRates();
      double preco=compra? Ask : Bid;
      double distSL=StopATR*s.atr;
      double distTP=AlvoATR*s.atr;
      double sl=compra? preco-distSL : preco+distSL;
      double tp=compra? preco+distTP : preco-distTP;

      //--- distancia minima exigida pela corretora
      double minDist=MarketInfo(Symbol(),MODE_STOPLEVEL)*Point;
      if(MathAbs(preco-sl)<minDist) sl=compra? preco-minDist : preco+minDist;
      if(MathAbs(tp-preco)<minDist) tp=compra? preco+minDist : preco-minDist;

      sl=NormalizeDouble(sl,Digits);
      tp=NormalizeDouble(tp,Digits);

      double lote=CalcLot(MathAbs(preco-sl));
      if(lote<=0.0) return;

      int ticket=OrderSend(Symbol(),(compra?OP_BUY:OP_SELL),lote,
                           NormalizeDouble(preco,Digits),
                           (int)(SlippagePontos*pipMult),sl,tp,
                           ComentarioOrdem,MagicNumber,0,
                           (compra?clrDodgerBlue:clrOrangeRed));
      if(ticket>0)
        {
         tradesHoje++;
         Print((compra?"COMPRA ":"VENDA "),lote," @ ",preco," SL ",sl," TP ",tp);
         return;
        }

      int err=GetLastError();
      Print("OrderSend falhou (tentativa ",tent+1,"): ",err);
      if(err!=136 && err!=138 && err!=135) return;   // so repete em requote
      Sleep(300);
     }
  }
//+------------------------------------------------------------------+
`;

function highlight(src){
